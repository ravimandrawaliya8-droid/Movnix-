<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Oscars Universe - Movnix</title>

<!-- SEO -->
<meta name="description" content="Explore Oscars winners, nominees & iconic moments from 2000 to 2026.">
<meta name="theme-color" content="#0b0b0f">

<!-- CSS -->
<link rel="stylesheet" href="css/oscars.css">

<!-- Preload Hero Image (faster load) -->
<link rel="preload" as="image" href="images/hero.jpg">

</head>

<body>

<!-- ================= HERO ================= -->
<section class="hero">

  <div class="hero-overlay"></div>

  <div class="hero-content">
    <h1 id="heroTitle">🏆 The Oscars Universe</h1>
    <p id="heroDesc">Explore every Academy Awards year, winners & moments</p>

    <div class="hero-buttons">
      <button onclick="goToYear(2026)">🔥 Latest Oscars (2026)</button>
      <button onclick="scrollToYears()">📂 Browse All Years</button>
      <button id="topRatedBtn">⭐ Top Rated Winners</button>
    </div>
  </div>

</section>

<!-- ================= NAV ================= -->
<div class="tabs">
  <span class="active">🏆 Winners</span>
  <span>🎭 Nominees</span>
  <span>🎥 Highlights</span>
  <span>🔥 Trending</span>
</div>

<!-- ================= FEATURED ================= -->
<section class="featured">

  <div class="featured-card">

    <div class="featured-text">
      <h2 id="featuredTitle">🏆 The 2026 Oscars</h2>
      <p id="featuredDesc">Explore winners, nominees & highlights</p>
      <button id="exploreBtn">Explore Winners →</button>
    </div>

    <img src="images/oscar-group.jpg" alt="Oscars Ceremony">

  </div>

</section>

<!-- ================= ICONIC ================= -->
<section class="iconic">

  <h2>Iconic Oscar Winners</h2>

  <!-- Loader -->
  <div id="loader" style="display:none; text-align:center; padding:20px;">
    <p>Loading winners...</p>
  </div>

  <div class="card-row" id="winnersContainer"></div>

</section>

<!-- ================= TRENDING ================= -->
<section class="trending">

  <h2>🔥 Trending Oscar Movies</h2>

  <div class="card-row" id="trendingContainer"></div>

</section>

<!-- ================= NO JS ================= -->
<noscript>
  <p style="padding:20px;color:red;">
    JavaScript is disabled. Please enable it to view Oscars data.
  </p>
</noscript>

<!-- ================= SCRIPT ================= -->
<script src="js/oscars.js" defer></script>

</body>
  </html>
