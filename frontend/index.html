<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movnix</title>

<style>
/* ===== BODY & FONT ===== */
body {
    margin: 0;
    background: #0f0f0f;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
}

/* ===== HEADER ===== */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #000;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.logo img {
    height: 36px;
}

/* ===== SEARCH ===== */
.search-box {
    position: relative;
}

#search-btn {
    background:none;
    border:none;
    color:white;
    cursor:pointer;
    font-size:18px;
}

.search {
    display:none; /* hidden initially, toggled by icon */
    background: #1c1c1c;
    border: none;
    padding: 6px 12px;
    border-radius: 20px;
    color: white;
    width: 150px;
    position:absolute;
    top:30px;
    left:0;
}

.search-results {
    position: absolute;
    top: 60px;
    left: 0;
    background: #111;
    width: 220px;
    display: none;
    border-radius: 6px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 10;
}

.search-results div {
    padding: 8px;
    cursor: pointer;
}

.search-results div:hover {
    background: #222;
}

/* ===== LOGIN / SIGNUP ===== */
.auth-buttons {
    display: flex;
    gap: 8px;
}

.auth-buttons button {
    background: white;
    border: none;
    color: black;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
}

.auth-buttons button:hover {
    background: #e5e5e5;
}

<!-- ===== HERO BANNER ===== -->
<div id="hero" class="hero">
    <!-- Full dark background layer -->
    <div class="hero-dark-bg"></div>

    <div class="hero-content">
        <!-- Left Poster -->
        <div class="hero-left">
            <img id="hero-poster" src="" alt="Hero Poster">
        </div>

        <!-- Right Info Overlay -->
        <div class="hero-right">
            <h1 id="hero-title">Loading...</h1>
            <p id="hero-overview"></p>
            <div class="hero-rating" id="hero-rating">⭐ N/A</div>
            <button id="hero-trailer">Watch Trailer</button>
        </div>
    </div>

    <!-- Hero Pages Below -->
    <div id="hero-pages" class="hero-pages">
        <!-- Trailers Row -->
        <div class="hero-row" id="hero-trailers">
            <h3>Trailers</h3>
            <div class="row-scroll" id="trailers-row"></div>
        </div>

        <!-- Awards / Festivals Row -->
        <div class="hero-row" id="hero-awards">
            <h3>Awards & Festivals</h3>
            <div class="row-scroll" id="awards-row"></div>
        </div>
    </div>
</div>

<style>
.hero-dark-bg {
    position: absolute;
    top: 0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.25); /* cinematic dark background */
    z-index:0;
}

.hero-content {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    width: 100%;
    gap: 20px;
    z-index:1;
}

.hero-left img {
    width: 180px;
    border-radius: 10px;
    object-fit: cover;
}

.hero-right {
    max-width: 60%;
    backdrop-filter: blur(8px);
    background: rgba(0,0,0,0.5);
    padding: 16px;
    border-radius: 12px;
}

.hero-right h1 {
    font-size: 28px;
    margin:0;
}

.hero-right p {
    font-size: 14px;
    margin-top:8px;
    max-height: 80px;
    overflow: hidden;
}

.hero-right .hero-rating {
    margin-top: 6px;
    font-weight: bold;
    color: red;
}

.hero-right button {
    margin-top: 10px;
    background: red;
    border: none;
    padding: 6px 12px;
    border-radius: 20px;
    color: white;
    cursor: pointer;
}

/* Hero Pages */
.hero-pages {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    z-index:1;
}

.hero-row h3 {
    margin: 0 0 6px 10px;
    color: white;
}

.row-scroll {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 6px;
}

.row-scroll::-webkit-scrollbar {
    height:6px;
}

.row-scroll::-webkit-scrollbar-thumb {
    background:red;
    border-radius:3px;
}

.row-scroll .card {
    min-width: 120px;
    cursor:pointer;
    border-radius:6px;
}
</style>

<script>
// Hero Movie + Pages JS
function loadHero(movie) {
    document.getElementById("hero-poster").src = movie.poster_path? IMG+movie.poster_path : "https://via.placeholder.com/200x300";
    document.getElementById("hero-title").innerText = movie.title || movie.name;
    document.getElementById("hero-overview").innerText = movie.overview;
    document.getElementById("hero-rating").innerText = "⭐ " + (movie.vote_average ? movie.vote_average.toFixed(1) : "N/A");

    // Watch Trailer button → separate trailer page
    document.getElementById("hero-trailer").onclick = () => {
        window.location.href = "trailer.html?id=" + movie.id;
    };

    // Load Trailers Row
    fetch(`${API}/movie/${movie.id}/videos?api_key=${KEY}`)
    .then(r=>r.json())
    .then(d=>{
        const row=document.getElementById("trailers-row");
        row.innerHTML="";
        d.results.forEach(v=>{
            const div=document.createElement("div");
            div.className="card";
            div.innerHTML=`<img src="https://img.youtube.com/vi/${v.key}/0.jpg"><div style="font-size:12px;color:white">${v.name}</div>`;
            div.onclick=()=> window.open(`https://www.youtube.com/watch?v=${v.key}`,"_blank");
            row.appendChild(div);
        });
    });

    // Load Awards / Festivals Row (static example)
    const awards = ["Oscars", "SXSW", "Women History", "Golden Globes"];
    const awardsRow = document.getElementById("awards-row");
    awardsRow.innerHTML="";
    awards.forEach(a=>{
        const div=document.createElement("div");
        div.className="card";
        div.innerHTML=`<div style="font-size:12px;color:white;padding:8px;background:rgba(255,255,255,0.05);border-radius:6px;">${a}</div>`;
        awardsRow.appendChild(div);
    });
}

// Example: Load first trending movie as hero
fetch(`${API}/trending/movie/day?api_key=${KEY}`)
.then(r=>r.json())
.then(d=>{
    const heroMovie = d.results[0];
    loadHero(heroMovie);
});


const KEY="45fe7a9c4583e4374d3981bb55c39222";
const API="https://api.themoviedb.org/3";
const IMG="https://image.tmdb.org/t/p/w500";

let heroMovies=[];
let heroIndex=0;

// Show movies
function showMovies(list,id){
    const box=document.getElementById(id);
    box.innerHTML="";
    list.slice(0,25).forEach(m=>{
        const poster=m.poster_path?IMG+m.poster_path:"https://via.placeholder.com/200x300";
        const div=document.createElement("div");
        div.className="card";
        div.innerHTML=`<img src="${poster}">
                        <div class="title">${m.title || m.name}</div>
                        <div class="rating">⭐ ${m.vote_average?m.vote_average.toFixed(1):"N/A"}</div>`;
        div.onclick=()=>openMovieModal(m.id);
        box.appendChild(div);
    });
}

// Featured Today (Trending) function
function showTrending(list){
    const featuredBox=document.getElementById("trending-featured");
    const scrollBox=document.getElementById("trending");
    
    featuredBox.innerHTML="";
    scrollBox.innerHTML="";
    
    // First movie as featured
    const first=list[0];
    const poster=first.poster_path ? IMG+first.poster_path : "https://via.placeholder.com/200x300";
    
    const div=document.createElement("div");
    div.style.display="flex";
    div.style.gap="20px";
    div.style.width="100%";
    
    div.innerHTML=`
        <img src="${poster}" style="width:200px; border-radius:10px; border:3px solid red;">
        <div style="max-width:70%; backdrop-filter:blur(8px); background:rgba(0,0,0,0.25); padding:20px; border-radius:12px;">
            <h2 style="margin:0;">${first.title || first.name}</h2>
            <p style="font-size:14px; margin:8px 0;">${first.overview}</p>
            <div style="color:red; font-weight:bold;">⭐ ${first.vote_average?first.vote_average.toFixed(1):"N/A"}</div>
            <button style="margin-top:10px; background:red; border:none; padding:6px 12px; border-radius:20px; color:white; cursor:pointer;"
                    onclick="window.open('movie.html?id=${first.id}&play=trailer','_blank')">
                Watch Trailer
            </button>
        </div>
    `;
    featuredBox.appendChild(div);
    
    // Rest of the movies scrollable
    list.slice(1,25).forEach(m=>{
        const poster=m.poster_path?IMG+m.poster_path:"https://via.placeholder.com/200x300";
        const div=document.createElement("div");
        div.className="card";
        div.innerHTML=`<img src="${poster}">
                        <div class="title">${m.title || m.name}</div>
                        <div class="rating">⭐ ${m.vote_average?m.vote_average.toFixed(1):"N/A"}</div>`;
        div.onclick=()=>openMovieModal(m.id);
        scrollBox.appendChild(div);
    });
}

// Hero banner rotation
function hero(){
    const m=heroMovies[heroIndex];
    document.getElementById("hero-poster").src=m.poster_path?IMG+m.poster_path:"https://via.placeholder.com/200x300";
    document.getElementById("hero-title").innerText=m.title;
    document.getElementById("hero-overview").innerText=m.overview;
    heroIndex++;
    if(heroIndex>=heroMovies.length) heroIndex=0;
}

// Open trailer modal
document.querySelector("#trailerModal .close").onclick=function(){
    document.getElementById("trailerFrame").src="";
    document.getElementById("trailerModal").style.display="none";
}

// Open movie page
function openMovieModal(id){
    window.location.href="movie.html?id="+id;
}

// Load sections
fetch(`${API}/trending/movie/day?api_key=${KEY}`).then(r=>r.json()).then(d=>{
    heroMovies=d.results.slice(0,10);
    showTrending(d.results);
    hero();
    setInterval(hero,5000);
});
fetch(`${API}/movie/top_rated?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"top"));
fetch(`${API}/movie/popular?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"popular"));
fetch(`${API}/movie/now_playing?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"now"));
fetch(`${API}/movie/upcoming?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"upcoming"));

// Box office
function loadBoxOffice(){
    fetch(`${API}/movie/popular?api_key=${KEY}`).then(r=>r.json()).then(d=>{
        const box=document.getElementById("boxoffice");
        box.innerHTML="";
        d.results.slice(0,10).forEach(m=>{
            const div=document.createElement("div");
            div.innerHTML=`<b style="color:white">${m.title}</b> <span style="color:red">⭐ ${m.vote_average}</span>`;
            box.appendChild(div);
        });
    });
}

// Celebrities
function loadCast(){
    fetch(`${API}/person/popular?api_key=${KEY}`).then(r=>r.json()).then(d=>{
        const box=document.getElementById("celebs");
        box.innerHTML="";
        d.results.slice(0,12).forEach(c=>{
            const img=c.profile_path?IMG+c.profile_path:"https://via.placeholder.com/200";
            const div=document.createElement("div");
            div.innerHTML=`<img src="${img}"><div style="font-size:12px">${c.name}</div>`;
            box.appendChild(div);
        });
    });
}

loadCast();
loadBoxOffice();

// Search toggle
document.getElementById("search-btn").onclick = () => {
    const input = document.getElementById("search");
    input.style.display = input.style.display === "block" ? "none" : "block";
    if(input.style.display === "block") input.focus();
};

// Search API
const search=document.getElementById("search");
const results=document.getElementById("searchResults");
search.addEventListener("input",function(){
    const q=this.value;
    if(q.length<2){ results.style.display="none"; return; }
    fetch(`${API}/search/movie?api_key=${KEY}&query=${q}`).then(r=>r.json()).then(d=>{
        results.innerHTML="";
        d.results.slice(0,5).forEach(m=>{
            const div=document.createElement("div");
            div.innerText=m.title;
            div.onclick=()=>{ window.location.href="movie.html?id="+m.id; };
            results.appendChild(div);
        });
        results.style.display="block";
    });
});
</script>
</body>
        </html>
