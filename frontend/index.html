<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movnix</title>

<style>
/* ===== BODY & FONT ===== */
body {
    margin: 0;
    background: #0f0f0f;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
}

/* ===== HEADER ===== */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #000;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.logo img {
    height: 36px;
}

.search-box {
    position: relative;
}

.search {
    background: #1c1c1c;
    border: none;
    padding: 6px 12px;
    border-radius: 20px;
    color: white;
    width: 180px;
}

.search-results {
    position: absolute;
    top: 36px;
    left: 0;
    background: #111;
    width: 220px;
    display: none;
    border-radius: 6px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 10;
}

.search-results div {
    padding: 8px;
    cursor: pointer;
}

.search-results div:hover {
    background: #222;
}

/* ===== LOGIN / SIGNUP ===== */
.auth-buttons {
    display: flex;
    gap: 8px;
}

.auth-buttons button {
    background: none;
    border: 1px solid red;
    color: white;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
}

.auth-buttons button:hover {
    background: red;
    color: white;
}

/* ===== CATEGORIES ===== */
.categories {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 10px 16px;
    max-height: 80px;
    overflow: hidden;
}

.cat {
    border: 1px solid red;
    padding: 6px 14px;
    border-radius: 20px;
    white-space: nowrap;
    font-size: 13px;
    cursor: pointer;
    flex: 1 0 auto;
    text-align: center;
}

.cat:hover {
    background: red;
}

/* ===== HERO BANNER ===== */
.hero {
    position: relative;
    height: 400px;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: flex-end;
    padding: 20px;
    color: white;
}

.hero-overlay {
    position: absolute;
    top:0; left:0;
    width:100%; height:100%;
    background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.2));
    z-index:0;
}

.hero-content {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    width: 100%;
    gap: 20px;
}

.hero-left {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 200px;
}

.hero-left img {
    border-radius: 10px;
    width: 180px;
    object-fit: cover;
    border: 2px solid red;
}

.hero-right {
    max-width: 60%;
    backdrop-filter: blur(6px);
    background: rgba(0,0,0,0.4);
    padding: 12px;
    border-radius: 10px;
}

.hero-right h1 {
    margin: 0;
    font-size: 24px;
    font-weight: bold;
}

.hero-right p {
    font-size: 14px;
    margin-top: 8px;
}

.hero-right button {
    background: red;
    border: none;
    padding: 6px 12px;
    color: white;
    border-radius: 20px;
    cursor: pointer;
    margin-top: 10px;
}

/* ===== SECTIONS ===== */
.section {
    padding: 16px;
}

.section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.section-head h2 {
    font-size: 18px;
    font-weight: bold;
    margin: 0;
}

.row, .celebs {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 6px;
    scrollbar-width: thin;
}

.row::-webkit-scrollbar, .celebs::-webkit-scrollbar {
    height: 6px;
}

.row::-webkit-scrollbar-thumb, .celebs::-webkit-scrollbar-thumb {
    background: red;
    border-radius: 3px;
}

.card {
    min-width: 140px;
    cursor: pointer;
}

.card img {
    width: 140px;
    border-radius: 6px;
}

.title {
    font-size: 14px;
    font-weight: bold;
    margin-top: 5px;
}

.rating {
    font-size: 12px;
    color: red;
    margin-top: 2px;
}

/* ===== BOX OFFICE ===== */
#boxoffice div {
    margin-bottom: 8px;
}

/* ===== FOOTER ===== */
footer {
    text-align: center;
    padding: 20px;
    color: #666;
}

/* ===== MODAL TRAILER ===== */
#trailerModal {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    z-index: 2000;
}

#trailerModal iframe {
    width: 90%;
    max-width: 800px;
    height: 450px;
    border: none;
    border-radius: 10px;
}

#trailerModal .close {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 28px;
    cursor: pointer;
    color: white;
}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
    .hero { height: 250px; flex-direction: column; padding: 10px;}
    .hero-left img { width: 120px; }
    .hero-right { max-width: 100%; font-size: 12px; }
    .hero-right h1 { font-size: 16px; }
    .hero-right p { font-size: 12px; }
    .search { width: 120px; }
}
</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<header>
    <div class="logo"><img src="logo.png" alt="Movnix Logo"></div>

    <div class="search-box">
        <input class="search" id="search" placeholder="Search">
        <div id="searchResults" class="search-results"></div>
    </div>

    <div class="auth-buttons">
        <button>Login</button>
        <button>Signup</button>
    </div>
</header>

<!-- ===== CATEGORIES ===== -->
<div class="categories">
    <div class="cat">Movies</div>
    <div class="cat">Hollywood</div>
    <div class="cat">Horror</div>
    <div class="cat">South</div>
    <div class="cat">Bollywood</div>
    <div class="cat">Cartoon</div>
    <div class="cat">Anime</div>
    <div class="cat">Drama</div>
    <div class="cat">TV Serial</div>
</div>

<!-- ===== HERO BANNER ===== -->
<div id="hero" class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content" style="display:flex; gap:20px; align-items:flex-end;">
        <div class="hero-left">
            <img id="hero-poster" src="" alt="Hero Poster">
        </div>
        <div class="hero-right" style="backdrop-filter:blur(8px); background:rgba(0,0,0,0.25); padding:20px; border-radius:12px; max-width:60%;">
            <h1 id="hero-title" style="margin:0; font-size:24px; font-weight:bold;"></h1>
            <p id="hero-overview" style="font-size:14px; max-height:120px; overflow:hidden; margin:10px 0;"></p>
            <button id="hero-trailer" style="background:red; border:none; color:white; padding:8px 16px; border-radius:20px; cursor:pointer;">
                Watch Trailer
            </button>
        </div>
    </div>
</div>

<!-- ===== MOVIE SECTIONS ===== -->
<div class="section" id="trending-section">
    <div class="section-head"><h2>Featured Today</h2></div>
    
    <!-- Featured movie large -->
    <div id="trending-featured" class="featured-box" style="display:flex; flex-direction:row; gap:20px; margin-bottom:20px;"></div>
    
    <!-- Scrollable next movies -->
    <div id="trending" class="row"></div>
</div>
    
<div class="section">
    <div class="section-head"><h2>Top Rated Movies</h2></div>
    <div id="top" class="row"></div>
</div>

<div class="section">
    <div class="section-head"><h2>Popular Movies</h2></div>
    <div id="popular" class="row"></div>
</div>

<div class="section">
    <div class="section-head"><h2>Now Playing</h2></div>
    <div id="now" class="row"></div>
</div>

<div class="section">
    <div class="section-head"><h2>Upcoming Movies</h2></div>
    <div id="upcoming" class="row"></div>
</div>

<!-- ===== CELEBRITIES ===== -->
<div class="section">
    <div class="section-head"><h2>Popular Celebrities</h2></div>
    <div id="celebs" class="celebs"></div>
</div>

<!-- ===== BOX OFFICE ===== -->
<div class="section">
    <div class="section-head"><h2>Box Office Trends</h2></div>
    <div id="boxoffice"></div>
</div>

<!-- ===== FOOTER ===== -->
<footer>Movnix © 2026</footer>

<!-- ===== TRAILER MODAL ===== -->
<div id="trailerModal">
    <span class="close">&times;</span>
    <iframe id="trailerFrame" src="" allowfullscreen></iframe>
</div>

<!-- ===== SCRIPT ===== -->
<script>
const KEY="45fe7a9c4583e4374d3981bb55c39222";
const API="https://api.themoviedb.org/3";
const IMG="https://image.tmdb.org/t/p/w500";

let heroMovies=[];
let heroIndex=0;

// Show movies
function showMovies(list,id){
    const box=document.getElementById(id);
    box.innerHTML="";
    list.slice(0,25).forEach(m=>{
        const poster=m.poster_path?IMG+m.poster_path:"https://via.placeholder.com/200x300";
        const div=document.createElement("div");
        div.className="card";
        div.innerHTML=`<img src="${poster}">
                        <div class="title">${m.title || m.name}</div>
                        <div class="rating">⭐ ${m.vote_average?m.vote_average.toFixed(1):"N/A"}</div>`;
        div.onclick=()=>openMovieModal(m.id);
        box.appendChild(div);
    });
}

// Hero banner
function hero(){
    const m=heroMovies[heroIndex];
    document.getElementById("hero-poster").src=m.poster_path?IMG+m.poster_path:"https://via.placeholder.com/200x300";
    document.getElementById("hero-title").innerText=m.title;
    document.getElementById("hero-overview").innerText=m.overview;
    document.getElementById("hero-trailer").onclick=()=>openTrailerModal(m.id);
    heroIndex++;
    if(heroIndex>=heroMovies.length) heroIndex=0;
}

// Open trailer modal
function openTrailerModal(id){
    fetch(`${API}/movie/${id}/videos?api_key=${KEY}`)
    .then(r=>r.json())
    .then(d=>{
        const trailer = d.results.find(v => v.type === "Trailer");
        if(trailer){
            document.getElementById("trailerFrame").src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;
            document.getElementById("trailerModal").style.display = "flex";
        }
    });
}

// Close modal
document.querySelector("#trailerModal .close").onclick = function(){
    document.getElementById("trailerFrame").src = "";
    document.getElementById("trailerModal").style.display = "none";
}

// Show Trending with Featured Today
function showTrending(list){
    const featuredBox = document.getElementById("trending-featured");
    const scrollBox = document.getElementById("trending");
    
    featuredBox.innerHTML = "";
    scrollBox.innerHTML = "";
    
    // Featured movie
    const first = list[0];
    const poster = first.poster_path ? IMG + first.poster_path : "https://via.placeholder.com/200x300";
    
    const div = document.createElement("div");
    div.style.display = "flex";
    div.style.width = "100%";
    div.style.gap = "20px";
    
    div.innerHTML = `
        <img src="${poster}" style="width:220px; border-radius:10px; border:2px solid red; object-fit:cover;">
        <div style="flex:1; backdrop-filter:blur(6px); background:rgba(0,0,0,0.5); padding:16px; border-radius:10px;">
            <h2 style="margin:0; font-size:20px; font-weight:bold;">${first.title || first.name}</h2>
            <p style="font-size:14px; margin:8px 0; max-height:80px; overflow:hidden;">${first.overview}</p>
            <div style="color:red; font-weight:bold; margin-bottom:8px;">⭐ ${first.vote_average?first.vote_average.toFixed(1):"N/A"}</div>
            <button style="background:red; border:none; padding:8px 16px; border-radius:20px; color:white; cursor:pointer;"
                    onclick="openTrailerModal(${first.id})">
                Watch Trailer
            </button>
        </div>
    `;
    featuredBox.appendChild(div);
    
    // Scrollable movies
    list.slice(1, 25).forEach(m => {
        const poster = m.poster_path ? IMG + m.poster_path : "https://via.placeholder.com/200x300";
        const card = document.createElement("div");
        card.className = "card";
        card.style.minWidth = "150px"; // slightly bigger
        card.innerHTML = `
            <img src="${poster}">
            <div class="title">${m.title || m.name}</div>
            <div class="rating">⭐ ${m.vote_average ? m.vote_average.toFixed(1) : "N/A"}</div>
        `;
        card.onclick = () => openMovieModal(m.id);
        scrollBox.appendChild(card);
    });
    }


// Box office
function loadBoxOffice(){
    fetch(`${API}/movie/popular?api_key=${KEY}`).then(r=>r.json()).then(d=>{
        const box=document.getElementById("boxoffice");
        box.innerHTML="";
        d.results.slice(0,10).forEach(m=>{
            const div=document.createElement("div");
            div.innerHTML=`<b style="color:white">${m.title}</b> <span style="color:red">⭐ ${m.vote_average}</span>`;
            box.appendChild(div);
        });
    });
}

// Celebrities
function loadCast(){
    fetch(`${API}/person/popular?api_key=${KEY}`).then(r=>r.json()).then(d=>{
        const box=document.getElementById("celebs");
        box.innerHTML="";
        d.results.slice(0,12).forEach(c=>{
            const img=c.profile_path?IMG+c.profile_path:"https://via.placeholder.com/200";
            const div=document.createElement("div");
            div.innerHTML=`<img src="${img}"><div style="font-size:12px">${c.name}</div>`;
            box.appendChild(div);
        });
    });
}

// Movie modal placeholder
function openMovieModal(id){
    window.location.href="movie.html?id="+id;
}

// Load sections
fetch(`${API}/trending/movie/day?api_key=${KEY}`).then(r=>r.json()).then(d=>{
    heroMovies=d.results.slice(0,10);
    showTrending(d.results);  // Use new function
    hero();
    setInterval(hero,5000);
});
fetch(`${API}/movie/top_rated?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"top"));
fetch(`${API}/movie/popular?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"popular"));
fetch(`${API}/movie/now_playing?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"now"));
fetch(`${API}/movie/upcoming?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"upcoming"));

loadCast();
loadBoxOffice();

// Search
const search=document.getElementById("search");
const results=document.getElementById("searchResults");
search.addEventListener("input",function(){
    const q=this.value;
    if(q.length<2){ results.style.display="none"; return; }
    fetch(`${API}/search/movie?api_key=${KEY}&query=${q}`).then(r=>r.json()).then(d=>{
        results.innerHTML="";
        d.results.slice(0,5).forEach(m=>{
            const div=document.createElement("div");
            div.innerText=m.title;
            div.onclick=()=>{ window.location.href="movie.html?id="+m.id; };
            results.appendChild(div);
        });
        results.style.display="block";
    });
});
</script>

</body>
        </html>
