<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Movnix</title>

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 30px;
background:black;
position:sticky;
top:0;
z-index:1000;
}

.logo img{
height:42px;
}

nav{
display:flex;
gap:20px;
}

nav a{
color:white;
text-decoration:none;
font-size:14px;
padding:6px 12px;
border:1px solid red;
border-radius:20px;
}

nav a:hover{
background:red;
}

.right{
display:flex;
align-items:center;
gap:15px;
}

.search{
padding:6px 10px;
border-radius:4px;
border:none;
}

.login{
background:red;
border:none;
padding:7px 12px;
color:white;
border-radius:4px;
cursor:pointer;
}

.hero{
height:520px;
background-size:cover;
background-position:center;
display:flex;
align-items:flex-end;
padding:40px;
font-size:40px;
font-weight:bold;
position:relative;
}

.hero::after{
content:"";
position:absolute;
bottom:0;
left:0;
width:100%;
height:60%;
background:linear-gradient(transparent,#0b0b0b);
}

section{
padding:20px;
}

.section-title{
font-size:22px;
margin-bottom:15px;
}

.row{
display:flex;
gap:14px;
overflow-x:auto;
}

.card{
min-width:170px;
position:relative;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.15);
}

.card img{
width:170px;
border-radius:8px;
}

.rating{
position:absolute;
top:6px;
left:6px;
background:black;
padding:4px 6px;
font-size:12px;
border-radius:4px;
}

.watch{
position:absolute;
bottom:6px;
right:6px;
background:red;
padding:4px 6px;
font-size:12px;
border-radius:4px;
}

.celebs{
display:flex;
gap:20px;
overflow-x:auto;
}

.celebs img{
width:120px;
border-radius:50%;
}

footer{
margin-top:40px;
padding:30px;
background:black;
text-align:center;
color:gray;
}

</style>

</head>

<body>

<header>

<div class="logo">
<img src="logo.png">
</div>

<nav>

<a href="movies.html">Movies</a>
<a href="hollywood.html">Hollywood</a>
<a href="horror.html">Horror</a>
<a href="south.html">South</a>
<a href="bollywood.html">Bollywood</a>
<a href="cartoon.html">Cartoon</a>
<a href="anime.html">Anime</a>
<a href="drama.html">Drama</a>
<a href="tv.html">TV Serial</a>

</nav>

<div class="right">

<input class="search" placeholder="Search">

<button class="login">Login</button>

</div>

</header>

<div id="hero" class="hero"></div>

<section>

<div class="section-title">🔥 Trending Now</div>

<div id="trending" class="row"></div>

</section>


<section>

<div class="section-title">⭐ Top 20 This Week</div>

<div id="top" class="row"></div>

</section>


<section>

<div class="section-title">🎬 Popular Movies</div>

<div id="popular" class="row"></div>

</section>


<section>

<div class="section-title">🎥 Now Playing</div>

<div id="now" class="row"></div>

</section>


<section>

<div class="section-title">📅 Upcoming Movies</div>

<div id="upcoming" class="row"></div>

</section>


<section>

<div class="section-title">🏆 Fan Favorites</div>

<div id="fans" class="row"></div>

</section>


<section>

<div class="section-title">🎭 Most Popular Celebrities</div>

<div id="celebs" class="celebs"></div>

</section>


<footer>

Movnix © 2026

</footer>

<script>

const API="https://api.themoviedb.org/3"
const KEY="YOUR_TMDB_KEY"
const IMG="https://image.tmdb.org/t/p/w500"

let heroMovies=[]
let heroIndex=0

function show(list,id){

const box=document.getElementById(id)

if(!box) return

box.innerHTML=""

list.forEach(m=>{

const poster=m.poster_path
?IMG+m.poster_path
:"https://via.placeholder.com/200"

const div=document.createElement("div")

div.className="card"

div.innerHTML=`

<a href="movie.html?id=${m.id}">
<img src="${poster}">
</a>

<div class="rating">⭐ ${m.vote_average}</div>

<div class="watch">❤</div>

`

box.appendChild(div)

})

}



function hero(){

const el=document.getElementById("hero")

const m=heroMovies[heroIndex]

el.style.backgroundImage=`url(${IMG+m.backdrop_path})`

el.innerHTML=m.title

heroIndex++

if(heroIndex>=heroMovies.length){

heroIndex=0

}

}



fetch(`${API}/trending/movie/week?api_key=${KEY}`)

.then(r=>r.json())

.then(d=>{

heroMovies=d.results.slice(0,10)

show(d.results,"trending")

hero()

setInterval(hero,3000)

})



fetch(`${API}/movie/top_rated?api_key=${KEY}`)

.then(r=>r.json())

.then(d=>show(d.results,"top"))



fetch(`${API}/movie/popular?api_key=${KEY}`)

.then(r=>r.json())

.then(d=>show(d.results,"popular"))



fetch(`${API}/movie/now_playing?api_key=${KEY}`)

.then(r=>r.json())

.then(d=>show(d.results,"now"))



fetch(`${API}/movie/upcoming?api_key=${KEY}`)

.then(r=>r.json())

.then(d=>show(d.results,"upcoming"))



fetch(`${API}/person/popular?api_key=${KEY}`)

.then(r=>r.json())

.then(d=>{

const box=document.getElementById("celebs")

d.results.slice(0,10).forEach(c=>{

const img=c.profile_path
?IMG+c.profile_path
:"https://via.placeholder.com/200"

const div=document.createElement("div")

div.innerHTML=`

<a href="actor.html?id=${c.id}">
<img src="${img}">
<br>${c.name}
</a>

`

box.appendChild(div)

})

})

</script>

</body>

  </html>
