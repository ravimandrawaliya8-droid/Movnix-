<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movnix</title>

<style>
/* ===== BODY & FONT ===== */
body {
    margin: 0;
    background: #0f0f0f;
    font-family: Arial, sans-serif;
    color: white;
}

/* ===== HEADER ===== */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #000;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.logo img {
    height: 36px;
}

.search-box {
    position: relative;
}

.search {
    background: #1c1c1c;
    border: none;
    padding: 6px 12px;
    border-radius: 20px;
    color: white;
    width: 180px;
}

.search-results {
    position: absolute;
    top: 36px;
    left: 0;
    background: #111;
    width: 220px;
    display: none;
    border-radius: 6px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 10;
}

.search-results div {
    padding: 8px;
    cursor: pointer;
}

.search-results div:hover {
    background: #222;
}

/* ===== LOGIN / SIGNUP ===== */
.auth-buttons {
    display: flex;
    gap: 8px;
}

.auth-buttons button {
    background: red;
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
}

.auth-buttons button:hover {
    opacity: 0.9;
}

/* ===== CATEGORIES ===== */
.categories {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 10px 16px;
}

.cat {
    border: 1px solid red;
    padding: 6px 14px;
    border-radius: 20px;
    white-space: nowrap;
    font-size: 13px;
    cursor: pointer;
    flex: 1 0 auto;
    text-align: center;
}

.cat:hover {
    background: red;
}

/* ===== HERO BANNER ===== */
.hero {
    position: relative;
    height: 300px;
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
    color: white;
}

.hero-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0));
    z-index: 0;
}

.hero-content {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
}

.hero-content div {
    font-size: 24px;
    font-weight: bold;
}

.hero-content button {
    background: red;
    border: none;
    padding: 6px 14px;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}

/* ===== SECTIONS ===== */
.section {
    padding: 16px;
}

.section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.see {
    color: #3ea6ff;
    font-size: 13px;
    cursor: pointer;
}

/* ===== MOVIE / CELEBRITY ROWS ===== */
.row, .celebs {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 6px;
}

.card {
    min-width: 140px;
    cursor: pointer;
}

.card img {
    width: 140px;
    border-radius: 6px;
}

.title {
    font-size: 13px;
    margin-top: 5px;
}

.rating {
    font-size: 12px;
    color: yellow;
}

/* ===== BOX OFFICE ===== */
#boxoffice div {
    margin-bottom: 8px;
}

/* ===== FOOTER ===== */
footer {
    text-align: center;
    padding: 20px;
    color: #666;
}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
    .hero { height: 220px; font-size: 18px; padding: 14px; }
    .hero-content div { font-size: 18px; }
    .search { width: 120px; }
}
</style>

</head>
<body>

<!-- ===== HEADER ===== -->
<header>
    <div class="logo"><img src="logo.png"></div>

    <div class="search-box">
        <input class="search" id="search" placeholder="Search">
        <div id="searchResults" class="search-results"></div>
    </div>

    <div class="auth-buttons">
        <button>Login</button>
        <button>Signup</button>
    </div>
</header>

<!-- ===== CATEGORIES ===== -->
<div class="categories">
    <div class="cat">Movies</div>
    <div class="cat">Hollywood</div>
    <div class="cat">Horror</div>
    <div class="cat">South</div>
    <div class="cat">Bollywood</div>
    <div class="cat">Cartoon</div>
    <div class="cat">Anime</div>
    <div class="cat">Drama</div>
    <div class="cat">TV Serial</div>
</div>

<!-- ===== HERO BANNER ===== -->
<div id="hero" class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <div id="hero-title">Loading...</div>
        <button id="hero-trailer">Watch Trailer</button>
    </div>
</div>

<!-- ===== MOVIE SECTIONS ===== -->
<div class="section">
    <div class="section-head">
        <div>🔥 Trending Today</div>
        <div class="see">See All</div>
    </div>
    <div id="trending" class="row"></div>
</div>

<div class="section">
    <div class="section-head">
        <div>⭐ Top Rated Movies</div>
        <div class="see">See All</div>
    </div>
    <div id="top" class="row"></div>
</div>

<div class="section">
    <div class="section-head">
        <div>🎬 Popular Movies</div>
        <div class="see">See All</div>
    </div>
    <div id="popular" class="row"></div>
</div>

<div class="section">
    <div class="section-head">
        <div>🎥 Now Playing</div>
        <div class="see">See All</div>
    </div>
    <div id="now" class="row"></div>
</div>

<div class="section">
    <div class="section-head">
        <div>📅 Upcoming Movies</div>
        <div class="see">See All</div>
    </div>
    <div id="upcoming" class="row"></div>
</div>

<!-- ===== CELEBRITIES ===== -->
<div class="section">
    <div class="section-head">
        <div>🎭 Popular Celebrities</div>
        <div class="see">See All</div>
    </div>
    <div id="celebs" class="celebs"></div>
</div>

<!-- ===== BOX OFFICE ===== -->
<div class="section">
    <div class="section-head">
        <div>💰 Box Office Trends</div>
    </div>
    <div id="boxoffice"></div>
</div>

<!-- ===== FOOTER ===== -->
<footer>Movnix © 2026</footer>

<!-- ===== SCRIPT ===== -->
<script>
const KEY="45fe7a9c4583e4374d3981bb55c39222";
const API="https://api.themoviedb.org/3";
const IMG="https://image.tmdb.org/t/p/w500";

let heroMovies=[];
let heroIndex=0;

// Show movies in a row
function showMovies(list,id){
    const box=document.getElementById(id);
    box.innerHTML="";
    list.slice(0,25).forEach(m=>{
        const poster=m.poster_path?IMG+m.poster_path:"https://via.placeholder.com/200x300";
        const div=document.createElement("div");
        div.className="card";
        div.innerHTML=`
            <a href="movie.html?id=${m.id}"><img src="${poster}"></a>
            <div class="title">${m.title || m.name}</div>
            <div class="rating">⭐ ${m.vote_average?m.vote_average.toFixed(1):"N/A"}</div>
        `;
        box.appendChild(div);
    });
}

// Hero banner
function hero(){
    const el=document.getElementById("hero");
    const m=heroMovies[heroIndex];
    el.style.backgroundImage=`url(${IMG+m.backdrop_path})`;
    document.getElementById("hero-title").innerText=m.title;
    document.getElementById("hero-trailer").onclick=()=>watchTrailer(m.id);
    heroIndex++;
    if(heroIndex>=heroMovies.length) heroIndex=0;
}

// Watch trailer
function watchTrailer(id){
    fetch(`${API}/movie/${id}/videos?api_key=${KEY}`)
    .then(r=>r.json())
    .then(d=>{
        const trailer=d.results.find(v=>v.type==="Trailer");
        if(trailer) window.open(`https://youtube.com/watch?v=${trailer.key}`);
    });
}

// Box office
function loadBoxOffice(){
    fetch(`${API}/movie/popular?api_key=${KEY}`)
    .then(r=>r.json())
    .then(d=>{
        const box=document.getElementById("boxoffice");
        box.innerHTML="";
        d.results.slice(0,10).forEach(m=>{
            const div=document.createElement("div");
            div.innerHTML=`<b style="color:white">${m.title}</b> <span style="color:yellow">⭐ ${m.vote_average}</span>`;
            box.appendChild(div);
        });
    });
}

// Popular celebrities
function loadCast(){
    fetch(`${API}/person/popular?api_key=${KEY}`)
    .then(r=>r.json())
    .then(d=>{
        const box=document.getElementById("celebs");
        box.innerHTML="";
        d.results.slice(0,12).forEach(c=>{
            const img=c.profile_path?IMG+c.profile_path:"https://via.placeholder.com/200";
            const div=document.createElement("div");
            div.innerHTML=`<img src="${img}"><div style="font-size:12px">${c.name}</div>`;
            box.appendChild(div);
        });
    });
}

// Load all movie sections
fetch(`${API}/trending/movie/day?api_key=${KEY}`).then(r=>r.json()).then(d=>{
    heroMovies=d.results.slice(0,10);
    showMovies(d.results,"trending");
    hero();
    setInterval(hero,3000);
});

fetch(`${API}/movie/top_rated?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"top"));
fetch(`${API}/movie/popular?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"popular"));
fetch(`${API}/movie/now_playing?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"now"));
fetch(`${API}/movie/upcoming?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"upcoming"));

loadCast();
loadBoxOffice();

// Search functionality
const search=document.getElementById("search");
const results=document.getElementById("searchResults");
search.addEventListener("input",function(){
    const q=this.value;
    if(q.length<2){ results.style.display="none"; return; }
    fetch(`${API}/search/movie?api_key=${KEY}&query=${q}`)
    .then(r=>r.json())
    .then(d=>{
        results.innerHTML="";
        d.results.slice(0,5).forEach(m=>{
            const div=document.createElement("div");
            div.innerText=m.title;
            div.onclick=()=>{ location.href="movie.html?id="+m.id; };
            results.appendChild(div);
        });
        results.style.display="block";
    });
});
</script>

</body>
  </html>
