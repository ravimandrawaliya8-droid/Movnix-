<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movnix</title>

<style>
/* ===== BODY & FONT ===== */
body {
    margin: 0;
    background: #0f0f0f;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
}

/* ===== HEADER ===== */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #000;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.logo img {
    height: 36px;
}

/* ===== SEARCH ===== */
.search-box {
    position: relative;
}

#search-btn {
    background:none;
    border:none;
    color:white;
    cursor:pointer;
    font-size:18px;
}

.search {
    display:none; /* hidden initially, toggled by icon */
    background: #1c1c1c;
    border: none;
    padding: 6px 12px;
    border-radius: 20px;
    color: white;
    width: 150px;
    position:absolute;
    top:30px;
    left:0;
}

.search-results {
    position: absolute;
    top: 60px;
    left: 0;
    background: #111;
    width: 220px;
    display: none;
    border-radius: 6px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 10;
}

.search-results div {
    padding: 8px;
    cursor: pointer;
}

.search-results div:hover {
    background: #222;
}

/* ===== LOGIN / SIGNUP ===== */
.auth-buttons {
    display: flex;
    gap: 8px;
}

.auth-buttons button {
    background: white;
    border: none;
    color: black;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
}

.auth-buttons button:hover {
    background: #e5e5e5;
}

/* ===== IMDB HERO ===== */

.hero{
position:relative;
height:520px;
overflow:hidden;
display:flex;
flex-direction:column;
justify-content:flex-end;
}

.hero-backdrop{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
filter:brightness(40%);
z-index:0;
}

.hero-container{
position:relative;
display:flex;
gap:20px;
padding:20px;
align-items:flex-end;
z-index:1;
}

.hero-poster img{
width:160px;
border-radius:8px;
}

.hero-info{
max-width:500px;
}

.hero-info h1{
font-size:32px;
margin:0;
}

.hero-meta{
margin-top:6px;
font-weight:bold;
color:#f5c518;
}

.hero-info p{
font-size:14px;
margin-top:10px;
line-height:1.4;
max-height:90px;
overflow:hidden;
}

.hero-info button{
margin-top:10px;
background:#f5c518;
border:none;
padding:8px 16px;
border-radius:20px;
font-weight:bold;
cursor:pointer;
}

.hero-bottom{
position:relative;
padding:10px 20px;
z-index:1;
}

.hero-bottom h3{
margin:0 0 6px 0;
}

@media(max-width:600px){

.hero{
height:420px;
}

.hero-container{
flex-direction:row;
align-items:flex-end;
}

.hero-poster img{
width:110px;
}

.hero-info h1{
font-size:18px;
}

.hero-info p{
font-size:12px;
}

}


.row-scroll {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    scroll-behavior: smooth;
    padding-bottom: 6px;
}

.row-scroll::-webkit-scrollbar {
    height:6px;
}

.row-scroll::-webkit-scrollbar-thumb {
    background:red;
    border-radius:3px;
}

.row-scroll .card {
    min-width: 120px;
    cursor:pointer;
    border-radius:6px;
}

/* ===== SECTIONS ===== */
.section {
    padding: 16px;
}

.section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.section-head h2 {
    font-size: 18px;
    font-weight: bold;
    margin: 0;
}

.row, .celebs {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 6px;
    scrollbar-width: thin;
}

.row::-webkit-scrollbar, .celebs::-webkit-scrollbar {
    height: 6px;
}

.row::-webkit-scrollbar-thumb, .celebs::-webkit-scrollbar-thumb {
    background: red;
    border-radius: 3px;
}

.card {
    min-width: 140px;
    cursor: pointer;
}

.card img {
    width: 140px;
    border-radius: 6px;
}

.title {
    font-size: 14px;
    font-weight: bold;
    margin-top: 5px;
}

.rating {
    font-size: 12px;
    color: red;
    margin-top: 2px;
}

/* ===== BOX OFFICE ===== */
#boxoffice div {
    margin-bottom: 8px;
}

/* ===== FOOTER ===== */
footer {
    text-align: center;
    padding: 20px;
    color: #666;
}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
    .hero { height: 400px; flex-direction: column; padding: 10px;}
    .hero-left img { width: 120px; }
    .hero-right { max-width: 100%; font-size: 12px; }
    .hero-right h1 { font-size: 16px; }
    .hero-right p { font-size: 12px; }
    .search { width: 120px; }
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
    <div class="logo"><img src="logo.png" alt="Movnix Logo"></div>
    <div class="search-box">
        <button id="search-btn">🔍</button>
        <input class="search" id="search" placeholder="Search">
        <div id="searchResults" class="search-results"></div>
    </div>
    <div class="auth-buttons">
        <button>Login</button>
        <button>Signup</button>
    </div>
</header>

<!-- HERO IMDB STYLE -->
<div id="hero" class="hero">

<div class="hero-backdrop" id="hero-backdrop"></div>

<div class="hero-container">

<div class="hero-poster">
<img id="hero-poster" src="">
</div>

<div class="hero-info">

<h1 id="hero-title">Loading...</h1>

<div class="hero-meta">
<span id="hero-rating">⭐ N/A</span>
</div>

<p id="hero-overview"></p>

<button id="hero-trailer">▶ Watch Trailer</button>

</div>

</div>

<div class="hero-bottom">

<h3>Browse trailers</h3>

<div class="row-scroll" id="trailers-row"></div>

</div>

</div>

<!-- SECTIONS -->
<div class="section" id="trending-section">
    <div class="section-head"><h2>Featured Today</h2></div>
    <div id="trending-featured" style="display:flex; gap:20px; flex-wrap:wrap; margin-bottom:20px;"></div>
    <div id="trending" class="row"></div>
</div>
<div class="section">
    <div class="section-head"><h2>Top Rated Movies</h2></div>
    <div id="top" class="row"></div>
</div>
<div class="section">
    <div class="section-head"><h2>Popular Movies</h2></div>
    <div id="popular" class="row"></div>
</div>
<div class="section">
    <div class="section-head"><h2>Now Playing</h2></div>
    <div id="now" class="row"></div>
</div>
<div class="section">
    <div class="section-head"><h2>Upcoming Movies</h2></div>
    <div id="upcoming" class="row"></div>
</div>
<div class="section">
    <div class="section-head"><h2>Popular Celebrities</h2></div>
    <div id="celebs" class="celebs"></div>
</div>
<div class="section">
    <div class="section-head"><h2>Box Office Trends</h2></div>
    <div id="boxoffice"></div>
</div>

<footer>Movnix © 2026</footer>

<script>
const KEY="45fe7a9c4583e4374d3981bb55c39222";
const API="https://api.themoviedb.org/3";
const IMG="https://image.tmdb.org/t/p/w500";

let heroMovies=[];
let heroIndex=0;

// HERO + PAGES FUNCTION
function loadHero(movie){

const poster = movie.poster_path 
? IMG + movie.poster_path 
: "https://via.placeholder.com/200x300";

const backdrop = movie.backdrop_path 
? IMG + movie.backdrop_path 
: poster;

// HERO CONTENT
document.getElementById("hero-poster").src = poster;

document.getElementById("hero-backdrop").style.backgroundImage =
`linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.1)), url(${backdrop})`;

document.getElementById("hero-title").innerText =
movie.title || movie.name || "Unknown";

document.getElementById("hero-overview").innerText =
movie.overview || "No description available.";

document.getElementById("hero-rating").innerText =
"⭐ " + (movie.vote_average ? movie.vote_average.toFixed(1) : "N/A");


// WATCH TRAILER BUTTON
const trailerBtn = document.getElementById("hero-trailer");
trailerBtn.onclick = () => {
    window.open(`movie.html?id=${movie.id}&play=trailer`, "_blank");
};


// ===== TRAILERS ROW =====
fetch(`${API}/movie/${movie.id}/videos?api_key=${KEY}`)
.then(r=>r.json())
.then(d=>{

const row = document.getElementById("trailers-row");
row.innerHTML="";

const trailers = d.results.filter(v=>v.site==="YouTube");

trailers.slice(0,10).forEach(v=>{

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img src="https://img.youtube.com/vi/${v.key}/0.jpg">
<div style="font-size:12px;color:white">${v.name}</div>
`;

div.onclick=()=>{
window.open(`https://www.youtube.com/watch?v=${v.key}`,"_blank");
};

row.appendChild(div);

});


// AUTO SCROLL TRAILERS
let scrollPos = 0;

setInterval(()=>{
scrollPos += 200;

if(scrollPos >= row.scrollWidth){
scrollPos = 0;
}

row.scrollTo({
left: scrollPos,
behavior: "smooth"
});

},6000);

})
.catch(err=>console.log("Trailer error",err));


// ===== AWARDS ROW (SAFE) =====
const awardsRow = document.getElementById("awards-row");

if(awardsRow){

const awards = [
"Oscars",
"Golden Globes",
"SXSW",
"Cannes",
"Women History"
];

awardsRow.innerHTML="";

awards.forEach(a=>{

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div style="
font-size:12px;
color:white;
padding:8px;
background:rgba(255,255,255,0.05);
border-radius:6px">
${a}
</div>
`;

awardsRow.appendChild(div);

});

}

    }

// Featured Today function
function showTrending(list){
    const featuredBox=document.getElementById("trending-featured");
    const scrollBox=document.getElementById("trending");
    featuredBox.innerHTML="";
    scrollBox.innerHTML="";
    const first=list[0];
    const poster=first.poster_path ? IMG+first.poster_path : "https://via.placeholder.com/200x300";
    const div=document.createElement("div");
    div.style.display="flex"; div.style.gap="20px"; div.style.width="100%";
    div.innerHTML=`
        <img src="${poster}" style="width:200px; border-radius:10px; border:3px solid red;">
        <div style="max-width:70%; backdrop-filter:blur(8px); background:rgba(0,0,0,0.25); padding:20px; border-radius:12px;">
            <h2 style="margin:0;">${first.title || first.name}</h2>
            <p style="font-size:14px; margin:8px 0;">${first.overview}</p>
            <div style="color:red; font-weight:bold;">⭐ ${first.vote_average?first.vote_average.toFixed(1):"N/A"}</div>
            <button style="margin-top:10px; background:red; border:none; padding:6px 12px; border-radius:20px; color:white; cursor:pointer;"
                    onclick="window.open('movie.html?id=${first.id}&play=trailer','_blank')">
                Watch Trailer
            </button>
        </div>`;
    featuredBox.appendChild(div);
    list.slice(1,25).forEach(m=>{
        const poster=m.poster_path?IMG+m.poster_path:"https://via.placeholder.com/200x300";
        const div=document.createElement("div");
        div.className="card";
        div.innerHTML=`<img src="${poster}"><div class="title">${m.title || m.name}</div><div class="rating">⭐ ${m.vote_average?m.vote_average.toFixed(1):"N/A"}</div>`;
        div.onclick=()=>window.location.href="movie.html?id="+m.id;
        scrollBox.appendChild(div);
    });
}

// Load sections
fetch(`${API}/trending/movie/day?api_key=${KEY}`).then(r=>r.json()).then(d=>{
    heroMovies=d.results.slice(0,10);
    showTrending(d.results);
    loadHero(d.results[0]);
});
fetch(`${API}/movie/top_rated?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"top"));
fetch(`${API}/movie/popular?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"popular"));
fetch(`${API}/movie/now_playing?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"now"));
fetch(`${API}/movie/upcoming?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"upcoming"));

// Load cast
function loadCast(){
    fetch(`${API}/person/popular?api_key=${KEY}`).then(r=>r.json()).then(d=>{
        const box=document.getElementById("celebs"); box.innerHTML="";
        d.results.slice(0,12).forEach(c=>{
            const img=c.profile_path?IMG+c.profile_path:"https://via.placeholder.com/200";
            const div=document.createElement("div");
            div.innerHTML=`<img src="${img}"><div style="font-size:12px">${c.name}</div>`;
            box.appendChild(div);
        });
    });
}
loadCast();

// Load box office
function loadBoxOffice(){
    fetch(`${API}/movie/popular?api_key=${KEY}`).then(r=>r.json()).then(d=>{
        const box=document.getElementById("boxoffice"); box.innerHTML="";
        d.results.slice(0,10).forEach(m=>{
            const div=document.createElement("div");
            div.innerHTML=`<b style="color:white">${m.title}</b> <span style="color:red">⭐ ${m.vote_average}</span>`;
            box.appendChild(div);
        });
    });
}
loadBoxOffice();

// Search toggle
document.getElementById("search-btn").onclick=()=>{
    const input=document.getElementById("search");
    input.style.display=input.style.display==='block'?'none':'block';
    if(input.style.display==='block') input.focus();
};
const search=document.getElementById("search");
const results=document.getElementById("searchResults");
search.addEventListener("input",function(){
    const q=this.value;
    if(q.length<2){ results.style.display="none"; return; }
    fetch(`${API}/search/movie?api_key=${KEY}&query=${q}`).then(r=>r.json()).then(d=>{
        results.innerHTML="";
        d.results.slice(0,5).forEach(m=>{
            const div=document.createElement("div");
            div.innerText=m.title;
            div.onclick=()=>{ window.location.href="movie.html?id="+m.id; };
            results.appendChild(div);
        });
        results.style.display="block";
    });
});

// showMovies function
function showMovies(list,id){
    const box=document.getElementById(id); box.innerHTML="";
    list.slice(0,25).forEach(m=>{
        const poster=m.poster_path?IMG+m.poster_path:"https://via.placeholder.com/200x300";
        const div=document.createElement("div"); div.className="card";
        div.innerHTML=`<img src="${poster}"><div class="title">${m.title || m.name}</div><div class="rating">⭐ ${m.vote_average?m.vote_average.toFixed(1):"N/A"}</div>`;
        div.onclick=()=>window.location.href="movie.html?id="+m.id;
        box.appendChild(div);
    });
}
</script>
</body>
    </html>
