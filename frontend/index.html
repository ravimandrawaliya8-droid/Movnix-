<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Movnix</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="header">

<div class="logo">Movnix</div>

<div class="search">🔍</div>

</header>


<!-- HERO -->

<section id="hero">

<div class="hero-container">

<div class="hero-backdrop"></div>

<div class="hero-content">

<img id="hero-poster" class="hero-poster">

<div class="hero-info">

<h1 id="hero-title"></h1>

<div id="hero-rating"></div>

<div class="hero-buttons">

<button id="hero-trailer" class="hero-btn">
▶ Watch Trailer
</button>

<button id="hero-movie" class="hero-btn secondary">
View Movie
</button>

</div>

</div>

</div>

</div>

</section>


<!-- BROWSE TRAILERS -->

<section class="section">

<h2>Browse Trailers</h2>

<div id="trailers" class="row"></div>

</section>


<!-- TRENDING -->

<section class="section">

<h2>Trending Now</h2>

<div id="trending" class="row"></div>

</section>


<!-- TOP RATED -->

<section class="section">

<h2>Top Rated Movies</h2>

<div id="toprated" class="row"></div>

</section>


<!-- POPULAR -->

<section class="section">

<h2>Popular Movies</h2>

<div id="popular" class="row"></div>

</section>


<!-- UPCOMING -->

<section class="section">

<h2>Upcoming Movies</h2>

<div id="upcoming" class="row"></div>

</section>


<footer class="footer">

<p>Movnix © 2026</p>

</footer>


<script src="js/api.js"></script>

<script src="js/cards.js"></script>

<script src="js/trailerCards.js"></script>

<script src="js/hero.js"></script>

<script src="js/app.js"></script>


</body>

</html>
