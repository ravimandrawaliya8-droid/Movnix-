<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Movnix</title>

<style>

body{
margin:0;
background:#0f0f0f;
font-family:Arial;
color:white;
}

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px;
background:#000;
position:sticky;
top:0;
z-index:999;
}

.logo img{
height:34px;
}

.search-box{
position:relative;
}

.search{
background:#1c1c1c;
border:none;
padding:7px 10px;
border-radius:4px;
color:white;
width:160px;
}

.search-results{
position:absolute;
top:32px;
left:0;
background:#111;
width:220px;
display:none;
border-radius:6px;
}

.search-results div{
padding:8px;
cursor:pointer;
}

.search-results div:hover{
background:#222;
}

.categories{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
}

.cat{
border:1px solid red;
padding:6px 12px;
border-radius:20px;
white-space:nowrap;
font-size:13px;
cursor:pointer;
}

.cat:hover{
background:red;
}

.hero{
height:420px;
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:flex-end;
padding:20px;
font-size:28px;
font-weight:bold;
}

.hero button{
background:red;
border:none;
padding:8px 14px;
margin-top:10px;
color:white;
border-radius:4px;
}

.section{
padding:15px;
}

.section-head{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.see{
color:#3ea6ff;
font-size:13px;
cursor:pointer;
}

.row{
display:flex;
gap:12px;
overflow-x:auto;
}

.card{
min-width:140px;
cursor:pointer;
}

.card img{
width:140px;
border-radius:6px;
}

.title{
font-size:13px;
margin-top:5px;
}

.rating{
font-size:12px;
color:yellow;
}

.celebs{
display:flex;
gap:16px;
overflow-x:auto;
}

.celebs img{
width:85px;
border-radius:50%;
}

footer{
text-align:center;
padding:20px;
color:#666;
}

</style>

</head>

<body>

<header>

<div class="logo">
<img src="logo.png">
</div>

<div class="search-box">

<input class="search" id="search" placeholder="Search">

<div id="searchResults" class="search-results"></div>

</div>

</header>


<div class="categories">

<div class="cat">Movies</div>
<div class="cat">Hollywood</div>
<div class="cat">Horror</div>
<div class="cat">South</div>
<div class="cat">Bollywood</div>
<div class="cat">Cartoon</div>
<div class="cat">Anime</div>
<div class="cat">Drama</div>
<div class="cat">TV Serial</div>

</div>


<div id="hero" class="hero"></div>


<div class="section">

<div class="section-head">
<div>🔥 Trending Today</div>
<div class="see">See All</div>
</div>

<div id="trending" class="row"></div>

</div>


<div class="section">

<div class="section-head">
<div>⭐ Top Rated Movies</div>
<div class="see">See All</div>
</div>

<div id="top" class="row"></div>

</div>


<div class="section">

<div class="section-head">
<div>🎬 Popular Movies</div>
<div class="see">See All</div>
</div>

<div id="popular" class="row"></div>

</div>


<div class="section">

<div class="section-head">
<div>🎥 Now Playing</div>
<div class="see">See All</div>
</div>

<div id="now" class="row"></div>

</div>


<div class="section">

<div class="section-head">
<div>📅 Upcoming Movies</div>
<div class="see">See All</div>
</div>

<div id="upcoming" class="row"></div>

</div>


<div class="section">

<div class="section-head">
<div>🎭 Popular Celebrities</div>
<div class="see">See All</div>
</div>

<div id="celebs" class="celebs"></div>

</div>

<div class="section">

<div class="section-head">
<div>💰 Box Office Trends</div>
</div>

<div id="boxoffice"></div>

</div>


<footer>

Movnix © 2026

</footer>


<script>

const KEY="YOUR_TMDB_KEY"
const API="https://api.themoviedb.org/3"
const IMG="https://image.tmdb.org/t/p/w500"

let heroMovies=[]
let heroIndex=0


function showMovies(list,id){

const box=document.getElementById(id)

box.innerHTML=""

list.slice(0,25).forEach(m=>{

const poster=m.poster_path
?IMG+m.poster_path
:"https://via.placeholder.com/200x300"

const div=document.createElement("div")

div.className="card"

div.innerHTML=`

<a href="movie.html?id=${m.id}">
<img src="${poster}">
</a>

<div class="title">${m.title || m.name}</div>

<div class="rating">
⭐ ${m.vote_average ? m.vote_average.toFixed(1) : "N/A"}
</div>

`

box.appendChild(div)

})

}


function hero(){

const el=document.getElementById("hero")

const m=heroMovies[heroIndex]

el.style.backgroundImage=`url(${IMG+m.backdrop_path})`

el.innerHTML=`

<div>${m.title}</div>

<button onclick="watchTrailer(${m.id})">Watch Trailer</button>

`

heroIndex++

if(heroIndex>=heroMovies.length) heroIndex=0

}


function watchTrailer(id){

fetch(`${API}/movie/${id}/videos?api_key=${KEY}`)

.then(r=>r.json())

.then(d=>{

const trailer=d.results.find(v=>v.type==="Trailer")

if(trailer){

window.open(`https://youtube.com/watch?v=${trailer.key}`)

}

})

}


function loadBoxOffice(){

fetch(`${API}/movie/popular?api_key=${KEY}`)

.then(r=>r.json())

.then(d=>{

const box=document.getElementById("boxoffice")

box.innerHTML=""

d.results.slice(0,10).forEach(m=>{

const div=document.createElement("div")

div.innerHTML=`

<div style="margin-bottom:6px">
<b>${m.title}</b>
</div>

<div style="color:yellow">
⭐ ${m.vote_average}
</div>

`

box.appendChild(div)

})

})

}


function loadCast(){

fetch(`${API}/person/popular?api_key=${KEY}`)

.then(r=>r.json())

.then(d=>{

const box=document.getElementById("celebs")

box.innerHTML=""

d.results.slice(0,12).forEach(c=>{

const img=c.profile_path
?IMG+c.profile_path
:"https://via.placeholder.com/200"

const div=document.createElement("div")

div.innerHTML=`

<img src="${img}">
<div style="font-size:12px">${c.name}</div>

`

box.appendChild(div)

})

})

}



fetch(`${API}/trending/movie/day?api_key=${KEY}`)
.then(r=>r.json())
.then(d=>{

heroMovies=d.results.slice(0,10)

showMovies(d.results,"trending")

hero()

setInterval(hero,3000)

})


fetch(`${API}/movie/top_rated?api_key=${KEY}`)
.then(r=>r.json())
.then(d=>showMovies(d.results,"top"))


fetch(`${API}/movie/popular?api_key=${KEY}`)
.then(r=>r.json())
.then(d=>showMovies(d.results,"popular"))


fetch(`${API}/movie/now_playing?api_key=${KEY}`)
.then(r=>r.json())
.then(d=>showMovies(d.results,"now"))


fetch(`${API}/movie/upcoming?api_key=${KEY}`)
.then(r=>r.json())
.then(d=>showMovies(d.results,"upcoming"))


loadCast()
loadBoxOffice()



const search=document.getElementById("search")
const results=document.getElementById("searchResults")

search.addEventListener("input",function(){

const q=this.value

if(q.length<2){

results.style.display="none"
return

}

fetch(`${API}/search/movie?api_key=${KEY}&query=${q}`)

.then(r=>r.json())

.then(d=>{

results.innerHTML=""

d.results.slice(0,5).forEach(m=>{

const div=document.createElement("div")

div.innerText=m.title

div.onclick=()=>{

location.href="movie.html?id="+m.id

}

results.appendChild(div)

})

results.style.display="block"

})

})

</script>

</body>
  </html>
