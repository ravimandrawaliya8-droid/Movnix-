<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movnix</title>

<style>
/* ===== BODY & FONT ===== */
body {
    margin: 0;
    background: #0f0f0f;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
}

/* ===== HEADER ===== */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #000;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.logo img {
    height: 36px;
}

/* ===== SEARCH ===== */
.search-box {
    position: relative;
}

#search-btn {
    background:none;
    border:none;
    color:white;
    cursor:pointer;
    font-size:18px;
}

.search {
    display:none;
    background: #1c1c1c;
    border: none;
    padding: 6px 12px;
    border-radius: 20px;
    color: white;
    width: 150px;
    position:absolute;
    top:30px;
    left:0;
}

.search-results {
    position: absolute;
    top: 60px;
    left: 0;
    background: #111;
    width: 220px;
    display: none;
    border-radius: 6px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 10;
}

.search-results div {
    padding: 8px;
    cursor: pointer;
}

.search-results div:hover {
    background: #222;
}

/* ===== LOGIN / SIGNUP ===== */
.auth-buttons {
    display: flex;
    gap: 8px;
}

.auth-buttons button {
    background: white;
    border: none;
    color: black;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
}

.auth-buttons button:hover {
    background: #e5e5e5;
}



/* ===== TRAILER SCROLL ===== */

.row-scroll{
display:flex;
gap:12px;
overflow-x:auto;
padding-bottom:6px;
scroll-behavior:smooth;
}

.row-scroll img{
width:150px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.row-scroll img:hover{
transform:scale(1.08);
}

.row-scroll::-webkit-scrollbar{
height:6px;
}

.row-scroll::-webkit-scrollbar-thumb{
background:#f5c518;
border-radius:3px;
}

/* ===== IMDB STYLE HERO ===== */

.hero{
position:relative;
height:420px;
margin:12px;
border-radius:16px;
overflow:hidden;
background:#000;
}

.hero-bg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background-size:cover;
background-position:center;
filter:blur(1px) brightness(0.55);
transform:scale(1.1);
}

.hero-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.2));
}

.hero-content{
position:absolute;
bottom:0;
width:100%;
padding:18px;
}

/* ===== NEW HERO LAYOUT ===== */

.top-ad{
height:80px;
margin:12px;
border-radius:12px;
background:#1a1a1a;
display:flex;
align-items:center;
justify-content:center;
color:#777;
font-size:14px;
}

.hero-content{
position:absolute;
bottom:0;
display:flex;
gap:25px;
padding:25px;
align-items:flex-end;
}

.hero-left img{
width:170px;
border-radius:10px;
box-shadow:0 12px 30px rgba(0,0,0,0.6);
}

.hero-right{
max-width:560px;
}

.hero-right h1{
margin:0;
font-size:32px;
font-weight:700;
}

.hero-meta{
margin-top:6px;
color:#f5c518;
font-weight:bold;
font-size:16px;
}

.hero-right p{
margin-top:10px;
font-size:14px;
line-height:1.5;
color:#ddd;
max-height:95px;
overflow:hidden;
}

.hero-right button{
margin-top:12px;
background:#f5c518;
border:none;
padding:10px 18px;
border-radius:25px;
font-weight:bold;
cursor:pointer;
font-size:14px;
}

.hero-right button:hover{
background:#ffd54f;
    }

/* ===== SECTIONS ===== */

.section {
    padding: 16px;
}

.section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.section-head h2 {
    font-size: 18px;
    font-weight: bold;
    margin: 0;
}

.row, .celebs {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 6px;
    scrollbar-width: thin;
}

.row::-webkit-scrollbar, .celebs::-webkit-scrollbar {
    height: 6px;
}

.row::-webkit-scrollbar-thumb, .celebs::-webkit-scrollbar-thumb {
    background: red;
    border-radius: 3px;
}

.card {
    min-width:140px;
    flex-shrink:0;
    cursor:pointer;
}

.card img {
    width:140px;
    border-radius:6px;
}

.title {
    font-size: 14px;
    font-weight: bold;
    margin-top: 5px;
}

.rating {
    font-size: 12px;
    color: red;
    margin-top: 2px;
}

/* ===== BOX OFFICE ===== */

#boxoffice div {
    margin-bottom: 8px;
}

/* ===== FOOTER ===== */

footer {
    text-align: center;
    padding: 20px;
    color: #666;
}

/* ===== MOBILE ===== */

@media(max-width:600px){

.hero{
height:420px;
}


.hero-info h1{
font-size:18px;
}

.hero-info p{
font-size:12px;
}

.hero { height: 400px; flex-direction: column; padding: 10px;}
.hero-left img { width: 120px; }
.hero-right { max-width: 100%; font-size: 12px; }
.hero-right h1 { font-size: 16px; }
.hero-right p { font-size: 12px; }
.search { width: 120px; }

}

</style>
</head>

<body>

<!-- HEADER -->
<header>
    <div class="logo"><img src="logo.png" alt="Movnix Logo"></div>
    <div class="search-box">
        <button id="search-btn">🔍</button>
        <input class="search" id="search" placeholder="Search">
        <div id="searchResults" class="search-results"></div>
    </div>
    <div class="auth-buttons">
        <button>Login</button>
        <button>Signup</button>
    </div>
</header>

<!-- HERO IMDB STYLE -->
<!-- TOP AD SPACE -->
<div class="top-ad">Advertisement Space</div>

<!-- HERO CINEMATIC STYLE -->
<div id="hero" class="hero">
    <div id="hero-bg" class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <div class="hero-left">
            <img id="hero-poster" src="https://via.placeholder.com/342x513?text=Loading..." alt="Movie Poster">
        </div>
        <div class="hero-right">
            <h1 id="hero-title">Loading...</h1>
            <div class="hero-meta" id="hero-rating">⭐ 0.0</div>
            <p id="hero-description">Movie description will appear here...</p>
            <button id="hero-play">Watch Trailer</button>
        </div>
    </div>
</div>

<!-- Browse trailers -->

<div class="section">

<div class="section-head">
<h2>Browse trailers</h2>
</div>

<div id="trailers-row" class="row-scroll"></div>

</div>

<!-- SECTIONS -->
<div class="section" id="trending-section">
    <div class="section-head"><h2>Featured Today</h2></div>
    <div id="trending-featured" style="display:flex; gap:20px; flex-wrap:wrap; margin-bottom:20px;"></div>
    <div id="trending" class="row"></div>
</div>
<div class="section">
    <div class="section-head"><h2>Top Rated Movies</h2></div>
    <div id="top" class="row"></div>
</div>
<div class="section">
    <div class="section-head"><h2>Popular Movies</h2></div>
    <div id="popular" class="row"></div>
</div>
<div class="section">
    <div class="section-head"><h2>Now Playing</h2></div>
    <div id="now" class="row"></div>
</div>
<div class="section">
    <div class="section-head"><h2>Upcoming Movies</h2></div>
    <div id="upcoming" class="row"></div>
</div>
<div class="section">
    <div class="section-head"><h2>Popular Celebrities</h2></div>
    <div id="celebs" class="celebs"></div>
</div>
<div class="section">
    <div class="section-head"><h2>Box Office Trends</h2></div>
    <div id="boxoffice"></div>
</div>

<footer>Movnix © 2026</footer>

<script>
const KEY="45fe7a9c4583e4374d3981bb55c39222";
const API="https://api.themoviedb.org/3";
const IMG="https://image.tmdb.org/t/p/w342";

let heroMovies=[];
let heroIndex=0;
let trailerScrollInterval=null;


// HERO FUNCTION
function loadHero(movie){

    const poster = movie.poster_path 
        ? IMG + movie.poster_path 
        : "https://via.placeholder.com/342x513?text=No+Poster";

    const backdrop = movie.backdrop_path 
        ? "https://image.tmdb.org/t/p/w780" + movie.backdrop_path
        : poster;

    // Hero background
    document.getElementById("hero-bg").style.backgroundImage = `url(${backdrop})`;

    // Hero poster
    document.getElementById("hero-poster").src = poster;

    // Hero title
    document.getElementById("hero-title").innerText = movie.title || movie.name || "Unknown";

    // Hero rating
    document.getElementById("hero-rating").innerText = "⭐ " + (movie.vote_average ? movie.vote_average.toFixed(1) : "N/A");

    // Hero description
    document.getElementById("hero-description").innerText = movie.overview || "No description available.";

    // Play button
    document.getElementById("hero-play").onclick = ()=>{
        window.open(`movie.html?id=${movie.id}&play=trailer`,"_blank");
    };
    }


// TRAILERS
fetch(`${API}/movie/${movie.id}/videos?api_key=${KEY}`)
.then(r=>r.json())
.then(d=>{

const row = document.getElementById("trailers-row");
row.innerHTML = "";

const trailers = d.results.filter(v=>v.site==="YouTube");

trailers.slice(0,10).forEach(v=>{

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img src="https://img.youtube.com/vi/${v.key}/0.jpg">
<div style="font-size:12px">${v.name}</div>
`;

div.onclick=()=>{
window.open(`https://www.youtube.com/watch?v=${v.key}`,"_blank");
};

row.appendChild(div);

});


// AUTO SCROLL FIX
let scrollPos = 0;

if(trailerScrollInterval){
clearInterval(trailerScrollInterval);
}

trailerScrollInterval=setInterval(()=>{

scrollPos += 200;

if(scrollPos >= row.scrollWidth){
scrollPos = 0;
}

row.scrollTo({
left: scrollPos,
behavior: "smooth"
});

},6000);

})
.catch(err=>console.log("Trailer error",err));

}

// ===== AWARDS ROW (SAFE) =====
const awardsRow = document.getElementById("awards-row");

if(awardsRow){

const awards = [
"Oscars",
"Golden Globes",
"SXSW",
"Cannes",
"Women History"
];

awardsRow.innerHTML="";

awards.forEach(a=>{

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div style="
font-size:12px;
color:white;
padding:8px;
background:rgba(255,255,255,0.05);
border-radius:6px">
${a}
</div>
`;

awardsRow.appendChild(div);

});

}


// Featured Today function
function showTrending(list){
    const featuredBox=document.getElementById("trending-featured");
    const scrollBox=document.getElementById("trending");
    featuredBox.innerHTML="";
    scrollBox.innerHTML="";
    const first=list[0];
    const poster=first.poster_path ? IMG+first.poster_path : "https://via.placeholder.com/200x300";
    const div=document.createElement("div");
    div.style.display="flex"; div.style.gap="20px"; div.style.width="100%";
    div.innerHTML=`
        <img src="${poster}" style="width:200px; border-radius:10px; border:3px solid red;">
        <div style="max-width:70%; backdrop-filter:blur(8px); background:rgba(0,0,0,0.25); padding:20px; border-radius:12px;">
            <h2 style="margin:0;">${first.title || first.name}</h2>
            <p style="font-size:14px; margin:8px 0;">${first.overview}</p>
            <div style="color:red; font-weight:bold;">⭐ ${first.vote_average?first.vote_average.toFixed(1):"N/A"}</div>
            <button style="margin-top:10px; background:red; border:none; padding:6px 12px; border-radius:20px; color:white; cursor:pointer;"
                    onclick="window.open('movie.html?id=${first.id}&play=trailer','_blank')">
                Watch Trailer
            </button>
        </div>`;
    featuredBox.appendChild(div);
    list.slice(1,25).forEach(m=>{
        const poster=m.poster_path?IMG+m.poster_path:"https://via.placeholder.com/200x300";
        const div=document.createElement("div");
        div.className="card";
        div.innerHTML=`<img src="${poster}"><div class="title">${m.title || m.name}</div><div class="rating">⭐ ${m.vote_average?m.vote_average.toFixed(1):"N/A"}</div>`;
        div.onclick=()=>window.location.href="movie.html?id="+m.id;
        scrollBox.appendChild(div);
    });
}

// Load sections
fetch(`${API}/trending/movie/day?api_key=${KEY}`).then(r=>r.json()).then(d=>{
    heroMovies=d.results.slice(0,10);
    showTrending(d.results);
    loadHero(d.results[0]);
});
fetch(`${API}/movie/top_rated?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"top"));
fetch(`${API}/movie/popular?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"popular"));
fetch(`${API}/movie/now_playing?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"now"));
fetch(`${API}/movie/upcoming?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"upcoming"));

// Load cast
function loadCast(){
    fetch(`${API}/person/popular?api_key=${KEY}`).then(r=>r.json()).then(d=>{
        const box=document.getElementById("celebs"); box.innerHTML="";
        d.results.slice(0,12).forEach(c=>{
            const img=c.profile_path?IMG+c.profile_path:"https://via.placeholder.com/200";
            const div=document.createElement("div");
            div.innerHTML=`<img src="${img}"><div style="font-size:12px">${c.name}</div>`;
            box.appendChild(div);
        });
    });
}
loadCast();

// Load box office
function loadBoxOffice(){
    fetch(`${API}/movie/popular?api_key=${KEY}`).then(r=>r.json()).then(d=>{
        const box=document.getElementById("boxoffice"); box.innerHTML="";
        d.results.slice(0,10).forEach(m=>{
            const div=document.createElement("div");
            div.innerHTML=`<b style="color:white">${m.title}</b> <span style="color:red">⭐ ${m.vote_average}</span>`;
            box.appendChild(div);
        });
    });
}
loadBoxOffice();

// Search toggle
document.getElementById("search-btn").onclick=()=>{
    const input=document.getElementById("search");
    input.style.display=input.style.display==='block'?'none':'block';
    if(input.style.display==='block') input.focus();
};
const search=document.getElementById("search");
const results=document.getElementById("searchResults");
search.addEventListener("input",function(){
    const q=this.value;
    if(q.length<2){ results.style.display="none"; return; }
    fetch(`${API}/search/movie?api_key=${KEY}&query=${q}`).then(r=>r.json()).then(d=>{
        results.innerHTML="";
        d.results.slice(0,5).forEach(m=>{
            const div=document.createElement("div");
            div.innerText=m.title;
            div.onclick=()=>{ window.location.href="movie.html?id="+m.id; };
            results.appendChild(div);
        });
        results.style.display="block";
    });
});

// showMovies function
function showMovies(list,id){
    const box=document.getElementById(id); box.innerHTML="";
    list.slice(0,25).forEach(m=>{
        const poster=m.poster_path?IMG+m.poster_path:"https://via.placeholder.com/200x300";
        const div=document.createElement("div"); div.className="card";
        div.innerHTML=`<img src="${poster}"><div class="title">${m.title || m.name}</div><div class="rating">⭐ ${m.vote_average?m.vote_average.toFixed(1):"N/A"}</div>`;
        div.onclick=()=>window.location.href="movie.html?id="+m.id;
        box.appendChild(div);
    });
}
</script>
</body>
    </html>
