<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movnix</title>

<style>
/* ===== BODY & FONT ===== */
body {
    margin: 0;
    background: #0f0f0f;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
}

/* ===== HEADER ===== */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #000;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.logo img {
    height: 36px;
}

/* ===== SEARCH ===== */
.search-box {
    position: relative;
}

#search-btn {
    background:none;
    border:none;
    color:white;
    cursor:pointer;
    font-size:18px;
}

.search {
    display:none; /* hidden initially, toggled by icon */
    background: #1c1c1c;
    border: none;
    padding: 6px 12px;
    border-radius: 20px;
    color: white;
    width: 150px;
    position:absolute;
    top:30px;
    left:0;
}

.search-results {
    position: absolute;
    top: 60px;
    left: 0;
    background: #111;
    width: 220px;
    display: none;
    border-radius: 6px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 10;
}

.search-results div {
    padding: 8px;
    cursor: pointer;
}

.search-results div:hover {
    background: #222;
}

/* ===== LOGIN / SIGNUP ===== */
.auth-buttons {
    display: flex;
    gap: 8px;
}

.auth-buttons button {
    background: white;
    border: none;
    color: black;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
}

.auth-buttons button:hover {
    background: #e5e5e5;
}

/* ===== HERO BANNER ===== */
.hero {
    position: relative;
    height: 400px;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: flex-end;
    padding: 20px;
    color: white;
}

.hero-overlay {
    position: absolute;
    top:0; left:0;
    width:100%; height:100%;
    background: linear-gradient(to top, rgba(0,0,0,0.6), rgba(0,0,0,0.1));
    z-index:0;
}

.hero-content {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    width: 100%;
    gap: 20px;
}

.hero-left {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 220px;
}

.hero-left img {
    border-radius: 10px;
    width: 200px;
    object-fit: cover;
    border: 3px solid red;
}

.hero-right {
    max-width: 60%;
    backdrop-filter: blur(8px);
    background: rgba(0,0,0,0.25);
    padding: 20px;
    border-radius: 12px;
}

.hero-right h1 {
    margin: 0;
    font-size: 28px;
    font-weight: bold;
}

.hero-right p {
    font-size: 14px;
    margin-top: 8px;
}

.hero-right button {
    background: red;
    border: none;
    padding: 6px 12px;
    color: white;
    border-radius: 20px;
    cursor: pointer;
    margin-top: 10px;
}

/* ===== SECTIONS ===== */
.section {
    padding: 16px;
}

.section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.section-head h2 {
    font-size: 18px;
    font-weight: bold;
    margin: 0;
}

.row, .celebs {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 6px;
    scrollbar-width: thin;
}

.row::-webkit-scrollbar, .celebs::-webkit-scrollbar {
    height: 6px;
}

.row::-webkit-scrollbar-thumb, .celebs::-webkit-scrollbar-thumb {
    background: red;
    border-radius: 3px;
}

.card {
    min-width: 140px;
    cursor: pointer;
}

.card img {
    width: 140px;
    border-radius: 6px;
}

.title {
    font-size: 14px;
    font-weight: bold;
    margin-top: 5px;
}

.rating {
    font-size: 12px;
    color: red;
    margin-top: 2px;
}

/* ===== BOX OFFICE ===== */
#boxoffice div {
    margin-bottom: 8px;
}

/* ===== FOOTER ===== */
footer {
    text-align: center;
    padding: 20px;
    color: #666;
}

/* ===== MODAL TRAILER ===== */
#trailerModal {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    z-index: 2000;
}

#trailerModal iframe {
    width: 90%;
    max-width: 800px;
    height: 450px;
    border: none;
    border-radius: 10px;
}

#trailerModal .close {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 28px;
    cursor: pointer;
    color: white;
}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
    .hero { height: 250px; flex-direction: column; padding: 10px;}
    .hero-left img { width: 120px; }
    .hero-right { max-width: 100%; font-size: 12px; }
    .hero-right h1 { font-size: 16px; }
    .hero-right p { font-size: 12px; }
    .search { width: 120px; }
}
</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<header>
    <div class="logo"><img src="logo.png" alt="Movnix Logo"></div>

    <div class="search-box">
        <button id="search-btn">🔍</button>
        <input class="search" id="search" placeholder="Search">
        <div id="searchResults" class="search-results"></div>
    </div>

    <div class="auth-buttons">
        <button>Login</button>
        <button>Signup</button>
    </div>
</header>

<!-- ===== HERO BANNER ===== -->
<div id="hero" class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <div class="hero-left">
            <img id="hero-poster" src="" alt="Hero Poster">
        </div>
        <div class="hero-right">
            <h1 id="hero-title">Loading...</h1>
            <p id="hero-overview"></p>
            <button id="hero-trailer">Watch Trailer</button>
        </div>
    </div>
</div>

<!-- ===== SECTIONS ===== -->
<div class="section" id="trending-section">
    <div class="section-head"><h2>Featured Today</h2></div>
    <div id="trending-featured" style="display:flex; gap:20px; flex-wrap:wrap; margin-bottom:20px;"></div>
    <div id="trending" class="row"></div>
</div>

<div class="section">
    <div class="section-head"><h2>Top Rated Movies</h2></div>
    <div id="top" class="row"></div>
</div>

<div class="section">
    <div class="section-head"><h2>Popular Movies</h2></div>
    <div id="popular" class="row"></div>
</div>

<div class="section">
    <div class="section-head"><h2>Now Playing</h2></div>
    <div id="now" class="row"></div>
</div>

<div class="section">
    <div class="section-head"><h2>Upcoming Movies</h2></div>
    <div id="upcoming" class="row"></div>
</div>

<div class="section">
    <div class="section-head"><h2>Popular Celebrities</h2></div>
    <div id="celebs" class="celebs"></div>
</div>

<div class="section">
    <div class="section-head"><h2>Box Office Trends</h2></div>
    <div id="boxoffice"></div>
</div>

<footer>Movnix © 2026</footer>

<div id="trailerModal">
    <span class="close">&times;</span>
    <iframe id="trailerFrame" src="" allowfullscreen></iframe>
</div>

<script>
const KEY="45fe7a9c4583e4374d3981bb55c39222";
const API="https://api.themoviedb.org/3";
const IMG="https://image.tmdb.org/t/p/w500";

let heroMovies=[];
let heroIndex=0;

// Show movies
function showMovies(list,id){
    const box=document.getElementById(id);
    box.innerHTML="";
    list.slice(0,25).forEach(m=>{
        const poster=m.poster_path?IMG+m.poster_path:"https://via.placeholder.com/200x300";
        const div=document.createElement("div");
        div.className="card";
        div.innerHTML=`<img src="${poster}">
                        <div class="title">${m.title || m.name}</div>
                        <div class="rating">⭐ ${m.vote_average?m.vote_average.toFixed(1):"N/A"}</div>`;
        div.onclick=()=>openMovieModal(m.id);
        box.appendChild(div);
    });
}

// Featured Today (Trending) function
function showTrending(list){
    const featuredBox=document.getElementById("trending-featured");
    const scrollBox=document.getElementById("trending");
    
    featuredBox.innerHTML="";
    scrollBox.innerHTML="";
    
    // First movie as featured
    const first=list[0];
    const poster=first.poster_path ? IMG+first.poster_path : "https://via.placeholder.com/200x300";
    
    const div=document.createElement("div");
    div.style.display="flex";
    div.style.gap="20px";
    div.style.width="100%";
    
    div.innerHTML=`
        <img src="${poster}" style="width:200px; border-radius:10px; border:3px solid red;">
        <div style="max-width:70%; backdrop-filter:blur(8px); background:rgba(0,0,0,0.25); padding:20px; border-radius:12px;">
            <h2 style="margin:0;">${first.title || first.name}</h2>
            <p style="font-size:14px; margin:8px 0;">${first.overview}</p>
            <div style="color:red; font-weight:bold;">⭐ ${first.vote_average?first.vote_average.toFixed(1):"N/A"}</div>
            <button style="margin-top:10px; background:red; border:none; padding:6px 12px; border-radius:20px; color:white; cursor:pointer;"
                    onclick="window.open('movie.html?id=${first.id}&play=trailer','_blank')">
                Watch Trailer
            </button>
        </div>
    `;
    featuredBox.appendChild(div);
    
    // Rest of the movies scrollable
    list.slice(1,25).forEach(m=>{
        const poster=m.poster_path?IMG+m.poster_path:"https://via.placeholder.com/200x300";
        const div=document.createElement("div");
        div.className="card";
        div.innerHTML=`<img src="${poster}">
                        <div class="title">${m.title || m.name}</div>
                        <div class="rating">⭐ ${m.vote_average?m.vote_average.toFixed(1):"N/A"}</div>`;
        div.onclick=()=>openMovieModal(m.id);
        scrollBox.appendChild(div);
    });
}

// Hero banner rotation
function hero(){
    const m=heroMovies[heroIndex];
    document.getElementById("hero-poster").src=m.poster_path?IMG+m.poster_path:"https://via.placeholder.com/200x300";
    document.getElementById("hero-title").innerText=m.title;
    document.getElementById("hero-overview").innerText=m.overview;
    heroIndex++;
    if(heroIndex>=heroMovies.length) heroIndex=0;
}

// Open trailer modal
document.querySelector("#trailerModal .close").onclick=function(){
    document.getElementById("trailerFrame").src="";
    document.getElementById("trailerModal").style.display="none";
}

// Open movie page
function openMovieModal(id){
    window.location.href="movie.html?id="+id;
}

// Load sections
fetch(`${API}/trending/movie/day?api_key=${KEY}`).then(r=>r.json()).then(d=>{
    heroMovies=d.results.slice(0,10);
    showTrending(d.results);
    hero();
    setInterval(hero,5000);
});
fetch(`${API}/movie/top_rated?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"top"));
fetch(`${API}/movie/popular?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"popular"));
fetch(`${API}/movie/now_playing?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"now"));
fetch(`${API}/movie/upcoming?api_key=${KEY}`).then(r=>r.json()).then(d=>showMovies(d.results,"upcoming"));

// Box office
function loadBoxOffice(){
    fetch(`${API}/movie/popular?api_key=${KEY}`).then(r=>r.json()).then(d=>{
        const box=document.getElementById("boxoffice");
        box.innerHTML="";
        d.results.slice(0,10).forEach(m=>{
            const div=document.createElement("div");
            div.innerHTML=`<b style="color:white">${m.title}</b> <span style="color:red">⭐ ${m.vote_average}</span>`;
            box.appendChild(div);
        });
    });
}

// Celebrities
function loadCast(){
    fetch(`${API}/person/popular?api_key=${KEY}`).then(r=>r.json()).then(d=>{
        const box=document.getElementById("celebs");
        box.innerHTML="";
        d.results.slice(0,12).forEach(c=>{
            const img=c.profile_path?IMG+c.profile_path:"https://via.placeholder.com/200";
            const div=document.createElement("div");
            div.innerHTML=`<img src="${img}"><div style="font-size:12px">${c.name}</div>`;
            box.appendChild(div);
        });
    });
}

loadCast();
loadBoxOffice();

// Search toggle
document.getElementById("search-btn").onclick = () => {
    const input = document.getElementById("search");
    input.style.display = input.style.display === "block" ? "none" : "block";
    if(input.style.display === "block") input.focus();
};

// Search API
const search=document.getElementById("search");
const results=document.getElementById("searchResults");
search.addEventListener("input",function(){
    const q=this.value;
    if(q.length<2){ results.style.display="none"; return; }
    fetch(`${API}/search/movie?api_key=${KEY}&query=${q}`).then(r=>r.json()).then(d=>{
        results.innerHTML="";
        d.results.slice(0,5).forEach(m=>{
            const div=document.createElement("div");
            div.innerText=m.title;
            div.onclick=()=>{ window.location.href="movie.html?id="+m.id; };
            results.appendChild(div);
        });
        results.style.display="block";
    });
});
</script>
</body>
        </html>
