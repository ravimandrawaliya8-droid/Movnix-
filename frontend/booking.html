<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Tickets - Movnix</title>

<link rel="stylesheet" href="css/style.css">

<style>

/* ===== BOOKING PAGE ===== */

.booking-container{
  padding: 20px;
  max-width: 1000px;
  margin: auto;
}

.movie-box{
  text-align: center;
}

.movie-box img{
  width: 200px;
  border-radius: 10px;
}

.seat-container{
  display: grid;
  grid-template-columns: repeat(8,1fr);
  gap: 10px;
  margin: 30px 0;
}

.seat{
  padding: 10px;
  background: #222;
  text-align: center;
  border-radius: 5px;
  cursor: pointer;
}

.seat.selected{
  background: #00ff88;
  color: black;
}

.seat.booked{
  background: red;
  cursor: not-allowed;
}

.book-btn{
  padding: 12px 20px;
  background: #00ff88;
  border: none;
  cursor: pointer;
  border-radius: 5px;
  font-weight: bold;
}

.total-box{
  margin: 20px 0;
  font-size: 18px;
}

</style>

</head>

<body>

<!-- HEADER SAME -->
<section class="header">

  <div class="top-bar">
    
    <div class="left">
      <div class="menu-btn" id="menuBtn">☰</div>
      <div class="logo">Mov<span>nix</span></div>
    </div>

    <div class="right">

      <div class="search-box">
        <input type="text" placeholder="Search movies...">
        <span>🔍</span>
      </div>

      <div class="auth">
        <button class="login">Login</button>
        <button class="signup">Sign Up</button>
      </div>

    </div>

  </div>

</section>

<!-- OVERLAY + MENU -->
<div class="side-menu" id="menu"></div>
<div class="overlay" id="overlay"></div>

<!-- ================= BOOKING SECTION ================= -->

<section class="booking-container">

  <!-- MOVIE INFO -->
  <div id="movieBox" class="movie-box">
    <!-- JS LOAD -->
  </div>

  <!-- SEATS -->
  <h2>Select Seats</h2>

  <div id="seatContainer" class="seat-container"></div>

  <!-- TOTAL -->
  <div class="total-box">
    Total: <span id="total">₹ 0</span>
  </div>

  <!-- BUTTON -->
  <button id="bookBtn" class="book-btn">
    Book Now
  </button>

</section>

<!-- FOOTER SAME STYLE -->
<section class="movnix-final">

  <div class="movnix-container">

    <div class="movnix-left">
      <h1>🔥 Watch on <span>MOVNIX</span></h1>
      <p>Your ultimate destination for movies & shows.</p>
    </div>

  </div>

</section>

<!-- JS FILE -->
<script src="js/booking.js"></script>

</body>
      </html>
