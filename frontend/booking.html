<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Tickets - Movnix</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- ================= HEADER ================= -->

<header class="header">

  <div class="top-bar">
    
    <div class="left">
      <div class="menu-btn" id="menuBtn">☰</div>
      <div class="logo">Mov<span>nix</span></div>
    </div>

    <div class="right">

      <div class="search-box">
        <input type="text" placeholder="Search movies...">
        <span>🔍</span>
      </div>

      <div class="auth">
        <button class="login">Login</button>
        <button class="signup">Sign Up</button>
      </div>

    </div>

  </div>

</header>

<!-- ================= MENU ================= -->

<div class="side-menu" id="menu"></div>
<div class="overlay" id="overlay"></div>

<!-- ================= APP ROOT (IMPORTANT) ================= -->

<main id="app">

  <!-- 🎬 MOVIE (AUTO LOAD BY JS) -->
  <section id="movieSection" class="section">
    <p>Loading movie...</p>
  </section>

  <!-- 🔽 FUTURE LAZY SECTIONS (EMPTY) -->
  <section id="theatreSection" class="section"></section>
  <section id="seatSection" class="section"></section>
  <section id="paymentSection" class="section"></section>

</main>

<!-- ================= JS ================= -->

<script src="js/booking.js"></script>

</body>
</html>
