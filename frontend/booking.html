<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theatre Selection</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="theatre-section">

  <div class="section-header">
    <div class="left">
      <span class="step">1</span>
      <h2>Select Theatre & Show Time</h2>
    </div>
    <span class="change">Change Movie</span>
  </div>

  <div class="theatre-slider">

    <!-- CARD -->
    <div class="theatre-card active">
      <div class="theatre-info">
        <h3>PVR Cinemas - Forum Mall</h3>
        <p>1.2 km away • IMAX 2D</p>
      </div>

      <div class="times">
        <button class="time">10:30 AM</button>
        <button class="time">1:15 PM</button>
        <button class="time active">4:30 PM</button>
        <button class="time">7:45 PM</button>
        <button class="time">10:45 PM</button>
      </div>
    </div>

    <!-- CARD -->
    <div class="theatre-card">
      <div class="theatre-info">
        <h3>INOX - City Center</h3>
        <p>2.1 km away • 2D, 3D</p>
      </div>

      <div class="times">
        <button class="time">11:00 AM</button>
        <button class="time">2:00 PM</button>
        <button class="time">5:00 PM</button>
        <button class="time">8:00 PM</button>
      </div>
    </div>

    <!-- CARD -->
    <div class="theatre-card">
      <div class="theatre-info">
        <h3>Cinépolis - Orion Mall</h3>
        <p>3.6 km away • IMAX 3D</p>
      </div>

      <div class="times">
        <button class="time">10:15 AM</button>
        <button class="time">1:00 PM</button>
        <button class="time">4:15 PM</button>
        <button class="time">7:30 PM</button>
      </div>
    </div>

  </div>

</section>

<script src="script.js"></script>
</body>
</html>
