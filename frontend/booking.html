<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movnix Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">Movnix</div>
  <div class="header-actions">
    <button class="app-btn">Use App</button>
    <span class="search">🔍</span>
  </div>
</header>

<!-- CATEGORY -->
<section class="categories">
  <div class="cat">🎬<span>Movies</span></div>
  <div class="cat">🏏<span>IPL 2026</span></div>
  <div class="cat">🎵<span>Music</span></div>
  <div class="cat">🏃<span>Sports</span></div>
  <div class="cat">🎭<span>Play</span></div>
</section>

<!-- BANNER -->
<section class="banner">
  <img src="banner.jpg" alt="">
</section>

<!-- OFFER -->
<section class="offer">
  <div class="offer-content">
    <p>Unlock ₹500 off on LIVE gigs</p>
    <button>Apply Now</button>
  </div>
</section>

<!-- MOVIES -->
<section class="movies">
  <div class="title">
    <h2>Recommended Movies</h2>
    <span>See All</span>
  </div>

  <div class="movie-list" id="movieList">
    <!-- JS se aayega -->
  </div>
</section>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="nav-item active">🏠<span>Home</span></div>
  <div class="nav-item">🎬<span>Movies</span></div>
  <div class="nav-item">🎟️<span>Events</span></div>
  <div class="nav-item">👤<span>Profile</span></div>
</nav>

<script src="app.js"></script>
</body>
  </html>
