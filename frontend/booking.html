<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Tickets - Movnix</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- HEADER -->
<section class="header">

  <div class="top-bar">
    
    <div class="left">
      <div class="menu-btn" id="menuBtn">☰</div>
      <div class="logo">Mov<span>nix</span></div>
    </div>

    <div class="right">

      <div class="search-box">
        <input type="text" placeholder="Search movies...">
        <span>🔍</span>
      </div>

      <div class="auth">
        <button class="login">Login</button>
        <button class="signup">Sign Up</button>
      </div>

    </div>

  </div>

</section>

<!-- MENU -->
<div class="side-menu" id="menu"></div>
<div class="overlay" id="overlay"></div>

<!-- ================= MOVIE DETAILS ================= -->

<section class="booking-container" id="movieSection">

  <div id="movieBox" class="movie-box">
    <p>Loading movie...</p>
  </div>

</section>

<!-- ================= THEATRE + SHOWTIMES ================= -->

<section class="booking-container" id="theatreSection">

  <h2>Nearby Theatres</h2>

  <div id="theatreContainer" class="theatre-container">
    <p>Loading theatres...</p>
  </div>

</section>

<!-- ================= SEAT SELECTION ================= -->

<section class="booking-container" id="seatSection">

  <h2>Select Seats</h2>

  <div id="seatContainer" class="seat-container">
    <p>Loading seats...</p>
  </div>

  <!-- TOTAL -->
  <div class="total-box">
    Total: <span id="total">₹ 0</span>
  </div>

  <!-- BUTTON -->
  <button id="bookBtn" class="book-btn">
    Book Now
  </button>

</section>

<!-- ================= FOOTER ================= -->

<section class="movnix-final">

  <div class="movnix-container">

    <div class="movnix-left">
      <h1>🔥 Watch on <span>MOVNIX</span></h1>
      <p>Your ultimate destination for movies & shows.</p>
    </div>

  </div>

</section>

<!-- JS -->
<script src="js/booking.js"></script>

</body>
                       </html>
