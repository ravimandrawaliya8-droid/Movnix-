<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movnix</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="location">
    <h2>It All Starts Here!</h2>
    <p>Mumbai: Western ›</p>
  </div>

  <div class="header-right">
    <button class="app-btn">Use App</button>
    <span class="search">🔍</span>
  </div>
</header>

<!-- CATEGORY -->
<section class="categories">
  <div class="cat active">🎬<span>Movies</span></div>
  <div class="cat">🏏<span>IPL 2026</span></div>
  <div class="cat">🎵<span>Music</span></div>
  <div class="cat">🏃<span>Sports</span></div>
  <div class="cat">🎭<span>Play</span></div>
</section>

<!-- MAIN BANNER -->
<section class="banner">
  <img src="https://via.placeholder.com/600x250" />
</section>

<!-- OFFER -->
<section class="offer">
  <div>
    <h4>Unlock ₹500 off</h4>
    <p>on LIVE gigs</p>
  </div>
  <button>Apply Now</button>
</section>

<!-- MOVIES -->
<section class="movies">
  <div class="title">
    <h2>Recommended Movies</h2>
    <span>See All ›</span>
  </div>

  <div class="movie-list" id="movieList"></div>
</section>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="nav-item active">🏠<span>Home</span></div>
  <div class="nav-item">🎬<span>Movies</span></div>
  <div class="nav-item">🎟️<span>Events</span></div>
  <div class="nav-item">👤<span>Profile</span></div>
</nav>

<script src="app.js"></script>
</body>
</html>
