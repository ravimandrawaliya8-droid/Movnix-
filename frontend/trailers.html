<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movnix - Trailers</title>

  <!-- CSS -->
  <link rel="stylesheet" href="trailers.css" />

</head>
<body>

  <!-- ================= HERO SECTION ================= -->

  <section class="hero">

    <!-- NAVBAR -->
    <header class="navbar">
      <div class="logo">Movnix</div>

      <nav class="nav-links">
        <a href="#">Home</a>
        <a href="#">Movies</a>
        <a href="#">Series</a>
        <a href="#">Trailers</a>
      </nav>

      <button class="nav-btn">Get Updates</button>
    </header>


    <!-- HERO CONTENT -->
    <div class="hero-content">

      <!-- LEFT TEXT -->
      <div class="hero-text">
        <h1 class="hero-title">Loading...</h1>
        <p class="hero-desc">
          Discover latest movie trailers and stay updated with trending films.
        </p>

        <button class="hero-btn">Search Now</button>
      </div>

      <!-- RIGHT VIDEO -->
      <div class="hero-video-box">
        <!-- JS will insert iframe here -->
      </div>

    </div>


    <!-- FILTER BAR -->
    <div class="hero-filters">

      <select id="languageFilter">
        <option>All Languages</option>
        <option>Hindi</option>
        <option>English</option>
      </select>

      <select id="yearFilter">
        <option>All Years</option>
        <option>2024</option>
        <option>2023</option>
      </select>

      <select id="sortFilter">
        <option>Trending</option>
        <option>Top Rated</option>
      </select>

      <select id="genreFilter">
        <option value="">All Genres</option>
        <option value="28">Action</option>
        <option value="18">Drama</option>
        <option value="35">Comedy</option>
      </select>

      <input 
        type="text" 
        id="searchInput" 
        placeholder="Search movies..."
      />

      <button class="search-btn">🔍</button>

    </div>

  </section>


  <!-- ================= NEXT SECTIONS PLACEHOLDER ================= -->

  <main class="content">

    <!-- Trending -->
    <section class="section">
      <h2>Trending Trailers</h2>
      <div class="movie-row trending-container"></div>
    </section>

    <!-- Latest -->
    <section class="section">
      <h2>Latest Trailers</h2>
      <div class="movie-row latest-container"></div>
    </section>

    <!-- Top Rated -->
    <section class="section">
      <h2>Top Rated</h2>
      <div class="movie-row toprated-container"></div>
    </section>

    <!-- Search Results -->
    <section class="section">
      <h2>Search Results</h2>
      <div class="movie-row search-results"></div>
    </section>

  </main>


  <!-- JS -->
  <script src="trailers.js"></script>

</body>
                                             </html>
