<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movnix - Trailers</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="trailers.css" />
</head>

<body>

  <!-- ================= HERO ================= -->

  <section id="hero" class="hero">

    <!-- NAVBAR -->
    <header class="navbar">
      <div class="logo">Movnix</div>

      <nav class="nav-links">
        <a href="#">Home</a>
        <a href="#">Movies</a>
        <a href="#">Series</a>
        <a href="#">Trailers</a>
      </nav>

      <button class="nav-btn">Get Updates</button>
    </header>

    <!-- HERO CONTENT -->
    <div class="hero-content">

      <!-- LEFT -->
      <div class="hero-text">
        <h1 class="hero-title">Discover Movies</h1>
        <p class="hero-desc">
          Discover latest movie trailers and stay updated with trending films.
        </p>

        <button class="hero-btn">Search Now</button>
      </div>

      <!-- RIGHT VIDEO -->
      <div class="hero-video-box"></div>

    </div>

    <!-- FILTER BAR -->
    <div class="hero-filters">

      <select id="languageFilter">
        <option value="">All Languages</option>
        <option value="hi">Hindi</option>
        <option value="en">English</option>
      </select>

      <select id="yearFilter">
        <option value="">All Years</option>
        <option value="2024">2024</option>
        <option value="2023">2023</option>
      </select>

      <select id="sortFilter">
        <option value="trending">Trending</option>
        <option value="top_rated">Top Rated</option>
      </select>

      <select id="genreFilter">
        <option value="">All Genres</option>
        <option value="28">Action</option>
        <option value="18">Drama</option>
        <option value="35">Comedy</option>
      </select>

      <input 
        type="text" 
        id="searchInput" 
        placeholder="Search movies..."
      />

      <button class="search-btn">Search</button>

    </div>

  </section>

  <!-- ================= CONTENT ================= -->

  <main class="content">

    <!-- TRENDING -->
    <section class="section">
      <h2>Trending Movies</h2>
      <div id="trending" class="movie-row"></div>
    </section>

    <!-- LATEST -->
    <section class="section">
      <h2>Latest Movies</h2>
      <div id="latest" class="movie-row"></div>
    </section>

    <!-- TOP RATED -->
    <section class="section">
      <h2>Top Rated Movies</h2>
      <div id="toprated" class="movie-row"></div>
    </section>

    <!-- TRAILERS -->
    <section class="section">
      <h2>Popular Trailers</h2>
      <div id="trailers" class="movie-row"></div>
    </section>

    <!-- SEARCH -->
    <section class="section">
      <h2>Search Results</h2>
      <div id="search" class="movie-row"></div>
    </section>

  </main>

  <!-- JS -->
  <script src="trailers.js" defer></script>

</body>
        </html>
