<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trending on Movnix</title>

<link rel="stylesheet" href="css/trending.css">

</head>

<body>

<!-- ================= HEADER ================= -->
<div class="trending-header">

  <h1> Trending on Movnix</h1>
  <p>Updated daily • Based on popularity</p>

  <!-- ✅ UPDATED FILTERS -->
  <div class="filter-chips">

    <span class="chip" data-country="IN">India</span>

    <!-- YEAR DROPDOWN -->
    <div class="year-dropdown">

      <button class="year-btn" onclick="toggleYearDropdown()">
        Year ▼
      </button>

      <div id="yearList" class="year-list"></div>

    </div>

    <span class="chip" data-rating="7">Rating 7+</span>

  </div>

</div>


<!-- ================= SORT BAR ================= -->
<div class="sort-bar">

  <div class="sort-left">
    Sort:
    <select id="sortSelect">
      <option value="popularity.desc"> Popularity</option>
      <option value="vote_average.desc"> Rating</option>
      <option value="release_date.desc"> Latest</option>
      <option value="release_date.asc"> Oldest</option>
    </select>
  </div>

  <div class="sort-right">
    <button class="sort-toggle" onclick="toggleSort()">
      ⬆⬇
    </button>
  </div>

</div>


<!-- ================= MOVIE LIST ================= -->
<div id="movieList" class="movie-list"></div>


<!-- ================= NO JS ================= -->
<noscript>
  <p style="padding:20px;color:red;">
    JavaScript is disabled. Please enable it.
  </p>
</noscript>


<!-- ================= JS ================= -->
<script src="js/trending.js"></script>

</body>
</html>
