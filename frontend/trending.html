<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trending on Movnix</title>

<link rel="stylesheet" href="css/trending.css">

</head>

<body>

<!-- ================= HEADER ================= -->
<div class="trending-header">

  <!-- TITLE -->
  <div class="header-content">
    <h1>🔥 Trending on <span>Movnix</span></h1>
    <p>Discover what’s popular right now • Updated daily</p>
  </div>

  <!-- PREMIUM FILTER BAR -->
  <div class="filter-bar">

    <!-- INDIA -->
    <span class="chip active" data-country="IN">🇮🇳 India</span>

    <!-- YEAR -->
    <div class="year-dropdown">
      <button class="year-btn" onclick="toggleYearDropdown()">
        📅 Year
      </button>
      <div id="yearList" class="year-list"></div>
    </div>

    <!-- RATING -->
    <span class="chip" data-rating="7">⭐ 7+ Rating</span>

    /* ⭐ + 🔵 DUAL RATING */
<div class="rating-row">

    <!-- TMDB RATING -->
    <div class="rating-badge">
        ⭐ ${rating}
    </div>

    <!-- USER RATING -->
    <div class="user-rating" onclick="event.stopPropagation();rateMovie(${movie.id}, this)">
        🔵 <span>${getUserRating(movie.id) || "Rate"}</span>
    </div>

</div>

    <!-- SEARCH -->
    <div class="search-box">
      <input type="text" placeholder="All Genres..." id="searchInput">
      <span class="search-icon">🔍</span>
    </div>

  </div>

</div>


<!-- ================= SORT BAR ================= -->
<div class="sort-bar">

  <div class="sort-left">
    Sort:
    <select id="sortSelect">
      <option value="popularity.desc"> Popularity</option>
      <option value="vote_average.desc"> Rating</option>
      <option value="release_date.desc"> Latest</option>
      <option value="release_date.asc"> Oldest</option>
    </select>
  </div>

  <div class="sort-right">
    <button class="sort-toggle" onclick="toggleSort()">
      ⬆⬇
    </button>
  </div>

</div>


<!-- ================= MOVIE LIST ================= -->
<div id="movieList" class="movie-list"></div>


<!-- ================= NO JS ================= -->
<noscript>
  <p style="padding:20px;color:red;">
    JavaScript is disabled. Please enable it.
  </p>
</noscript>


<!-- ================= JS ================= -->
<script src="js/trending.js"></script>

</body>
</html>
